<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px 20px; background: var(--bg); }
  .stack > * { margin: 0; }
  .stack { display: grid; gap: 4px; }
  .display { color: var(--text); }
</style>
</head>
<body>
  <div class="stack">
    <span class="display" style="font-variation-settings:'opsz' 32,'wght' 640; letter-spacing:-0.018em; font-size:3.2rem; line-height:1;">Abhijith Sivaprasadan</span>
    <span style="font-family:var(--font-mono); font-size:var(--type-sm); color:var(--muted); margin-top:8px;">Inter · opsz 32 · wght 640 · tracking −0.018em — hero display</span>
  </div>
</body>
</html>
