<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 16px 18px; background: #060806; position: relative;
         background-image:
           radial-gradient(120% 90% at 0% -10%, rgba(120,210,150,0.08), transparent 55%),
           linear-gradient(to right, rgba(120,210,150,0.04) 1px, transparent 1px),
           linear-gradient(to bottom, rgba(120,210,150,0.04) 1px, transparent 1px);
         background-size: auto, 26px 26px, 26px 26px; font-family: var(--font-mono); }
  .hud { display:flex; justify-content:space-between; align-items:center; margin:0 0 14px;
    font: 500 var(--type-xs)/1 var(--font-mono); letter-spacing:.12em; text-transform:uppercase; color:#9bd69f; }
  .hud span { color: rgba(155,214,159,0.5); }
  .grid { display:grid; grid-template-columns: 70px 1fr; gap: 12px 14px; align-items:center; }
  .rl { font: 500 10px/1.3 var(--font-mono); letter-spacing:.08em; text-transform:uppercase; color:rgba(155,214,159,0.5); }
  .set { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .div { grid-column:1 / -1; height:1px; background:rgba(155,214,159,0.1); margin:2px 0; }

  .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; min-height:42px; padding:0 18px;
    border-radius:6px; border:1px solid var(--line); font-family:var(--font-mono); font-size:0.82rem;
    font-weight:500; text-transform:uppercase; letter-spacing:0.02em; cursor:pointer; }
  .btn svg { width:14px; height:14px; }
  .primary { background:#9bd69f; border-color:#9bd69f; color:#071007; }
  .secondary { background:rgba(16,20,16,.74); color:#f2f0e7; border-color:rgba(155,214,159,0.3); }
  .ghost { background:transparent; color:#a8ada4; border-color:#2d3a31; }
  .alert { background:transparent; color:#d98b7d; border-color:rgba(217,139,125,0.45); }
  .pill { border-radius:999px; }
  /* sizes */
  .sm { min-height:32px; padding:0 12px; font-size:0.7rem; }
  .lg { min-height:50px; padding:0 24px; font-size:0.9rem; }
  .ico { padding:0; width:42px; min-height:42px; }
  /* states */
  .is-hover { transform:translateY(-2px); box-shadow:0 0 26px rgba(155,214,159,0.5), 0 6px 18px rgba(0,0,0,.3); }
  .is-press { transform:scale(0.97); box-shadow:inset 0 0 14px rgba(7,16,7,0.35); }
  .is-dis { opacity:0.42; }
  .ldg { color:transparent; position:relative; }
  .ldg::after { content:""; position:absolute; width:14px; height:14px; border-radius:50%;
    border:2px solid rgba(7,16,7,0.35); border-top-color:#071007; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .cap { font:400 10px/1.3 var(--font-mono); color:rgba(155,214,159,0.4); }
</style>
</head>
<body>
  <div class="hud"><span>COMPONENT</span>BUTTONS · CONTROL SET<span>04</span></div>
  <div class="grid">
    <div class="rl">Variant</div>
    <div class="set">
      <button class="btn primary">Primary</button>
      <button class="btn secondary">Secondary</button>
      <button class="btn ghost">Ghost</button>
      <button class="btn alert">Alert</button>
      <button class="btn primary pill">Pill</button>
    </div>

    <div class="div"></div>
    <div class="rl">Size</div>
    <div class="set">
      <button class="btn primary sm">Small</button>
      <button class="btn primary">Medium</button>
      <button class="btn primary lg">Large</button>
    </div>

    <div class="div"></div>
    <div class="rl">With icon</div>
    <div class="set">
      <button class="btn primary"><svg viewBox="0 0 14 14" fill="none"><path d="M7 1v9M3.5 6.5L7 10l3.5-3.5M2 13h10" stroke="#071007" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>Download CV</button>
      <button class="btn secondary">Case study<svg viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <button class="btn ghost ico" aria-label="Search"><svg viewBox="0 0 14 14" fill="none"><circle cx="6" cy="6" r="3.5" stroke="currentColor" stroke-width="1.3"/><path d="M8.6 8.6L12 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      <button class="btn secondary ico" aria-label="Menu"><svg viewBox="0 0 14 14" fill="none"><path d="M2 4h10M2 7h10M2 10h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg></button>
    </div>

    <div class="div"></div>
    <div class="rl">State</div>
    <div class="set">
      <button class="btn primary is-hover">Hover</button>
      <button class="btn primary is-press">Press</button>
      <button class="btn primary ldg">Loading</button>
      <button class="btn primary is-dis">Disabled</button>
      <span class="cap">lift + signal glow · settle · spinner · 42% opacity</span>
    </div>
  </div>
</body>
</html>
