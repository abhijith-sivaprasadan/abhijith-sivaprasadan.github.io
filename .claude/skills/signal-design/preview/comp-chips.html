<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 16px 18px; background: #060806; font-family:var(--font-mono);
         background-image:
           radial-gradient(120% 90% at 0% -10%, rgba(120,210,150,0.07), transparent 55%),
           linear-gradient(to right, rgba(120,210,150,0.04) 1px, transparent 1px),
           linear-gradient(to bottom, rgba(120,210,150,0.04) 1px, transparent 1px);
         background-size: auto, 26px 26px, 26px 26px; }
  .hud { display:flex; justify-content:space-between; align-items:center; margin:0 0 13px;
    font:500 var(--type-xs)/1 var(--font-mono); letter-spacing:.12em; text-transform:uppercase; color:#9bd69f; }
  .hud span { color: rgba(155,214,159,0.5); }
  .grid { display:grid; grid-template-columns:74px 1fr; gap:12px 14px; align-items:center; }
  .rl { font:500 10px/1.3 var(--font-mono); letter-spacing:.08em; text-transform:uppercase; color:rgba(155,214,159,0.5); }
  .set { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .div { grid-column:1/-1; height:1px; background:rgba(155,214,159,0.1); margin:1px 0; }

  /* lens chips — selectable, active one glows */
  .chip { display:inline-flex; align-items:center; gap:7px; padding:7px 13px; border-radius:999px; cursor:pointer;
    border:1px solid var(--line); background:rgba(16,20,16,0.6); color:var(--muted);
    font:500 0.76rem/1 var(--font-mono); }
  .chip i { width:7px; height:7px; border-radius:50%; background:currentColor; opacity:0.6; font-style:normal; }
  .chip.on { color:#071007; background:#9bd69f; border-color:#9bd69f;
    box-shadow:0 0 18px rgba(155,214,159,0.4); }
  .chip.on i { opacity:1; }

  /* instrument tool tags — square, technical */
  .tag { display:inline-flex; align-items:center; padding:5px 10px; border-radius:5px;
    border:1px solid rgba(101,214,201,0.32); background:rgba(101,214,201,0.08); color:#65d6c9;
    font:500 0.68rem/1.3 var(--font-mono); text-transform:uppercase; letter-spacing:.04em; }

  /* dismissible filter */
  .filt { display:inline-flex; align-items:center; gap:8px; padding:5px 8px 5px 11px; border-radius:5px;
    border:1px solid rgba(155,214,159,0.28); background:rgba(155,214,159,0.07); color:#b9e6bd;
    font:500 0.68rem/1.3 var(--font-mono); text-transform:uppercase; letter-spacing:.04em; }
  .filt b { font-weight:600; color:#9bd69f; }
  .filt x { font-style:normal; width:14px; height:14px; border-radius:50%; display:grid; place-items:center;
    background:rgba(155,214,159,0.18); color:#9bd69f; font-size:0.7rem; cursor:pointer; }
</style>
</head>
<body>
  <div class="hud"><span>COMPONENT</span>CHIPS &amp; TAGS<span>07</span></div>
  <div class="grid">
    <div class="rl">Lens</div>
    <div class="set">
      <span class="chip on"><i></i>Thermal &amp; Fluid</span>
      <span class="chip"><i></i>Energy Systems</span>
      <span class="chip"><i></i>Industrial R&amp;D</span>
      <span class="chip"><i></i>Research</span>
    </div>

    <div class="div"></div>
    <div class="rl">Tool tags</div>
    <div class="set">
      <span class="tag">ANSYS Fluent</span><span class="tag">k-omega SST</span>
      <span class="tag">LabVIEW</span><span class="tag">IDA ICE</span><span class="tag">Python</span>
    </div>

    <div class="div"></div>
    <div class="rl">Filter</div>
    <div class="set">
      <span class="filt"><b>Category</b> CFD &amp; Testing <x>×</x></span>
      <span class="filt"><b>Year</b> 2025 <x>×</x></span>
    </div>
  </div>
</body>
</html>
