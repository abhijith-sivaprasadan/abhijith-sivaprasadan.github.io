<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 18px; background: #060806;
         background-image: radial-gradient(120% 80% at 50% -20%, rgba(120,210,150,0.06), transparent 60%); }
  .tag { font: 500 var(--type-xs)/1.3 var(--font-mono); color: var(--muted); margin: 0 0 12px; text-transform: uppercase; letter-spacing:.04em;}
  .row { display: flex; gap: 11px; }
  .sw { flex: 1; border-radius: var(--radius-sm); overflow: hidden; position: relative;
        border: 1px solid color-mix(in srgb, var(--c) 45%, var(--line));
        background: linear-gradient(180deg, color-mix(in srgb, var(--c) 12%, #0a0d0a), #0a0d0a);
        box-shadow: 0 0 24px color-mix(in srgb, var(--c) 32%, transparent),
                    inset 0 0 22px color-mix(in srgb, var(--c) 10%, transparent); }
  /* the vivid colour band that makes it pop */
  .band { height: 40px; background: var(--c);
          box-shadow: 0 0 18px color-mix(in srgb, var(--c) 75%, transparent); }
  .meta { padding: 9px 11px; display: flex; flex-direction: column; gap: 3px; }
  .meta b { font: 600 var(--type-sm)/1.1 var(--font-mono); color: var(--c); }
  .meta span { font: 400 var(--type-xs)/1.2 var(--font-mono); color: color-mix(in srgb, var(--c) 60%, var(--muted)); }
</style>
</head>
<body>
  <p class="tag">Audience-lens tints — the hero "mode" switch re-tints --green</p>
  <div class="row">
    <div class="sw" style="--c:#65d6c9"><div class="band"></div><div class="meta"><b>Thermal</b><span>#65d6c9</span></div></div>
    <div class="sw" style="--c:#9bd69f"><div class="band"></div><div class="meta"><b>Energy</b><span>#9bd69f</span></div></div>
    <div class="sw" style="--c:#d7b46a"><div class="band"></div><div class="meta"><b>Industrial</b><span>#d7b46a</span></div></div>
    <div class="sw" style="--c:#8fb7ff"><div class="band"></div><div class="meta"><b>Research</b><span>#8fb7ff</span></div></div>
  </div>
</body>
</html>
