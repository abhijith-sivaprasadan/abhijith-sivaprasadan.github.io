<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px 20px; background: #060806;
         background-image:
           linear-gradient(to right, rgba(120,210,150,0.03) 1px, transparent 1px),
           linear-gradient(to bottom, rgba(120,210,150,0.03) 1px, transparent 1px);
         background-size: 26px 26px; font-family:var(--font-mono); }
  .stack { position:relative; height:188px; }
  .layer { position:absolute; border-radius:12px; border:1px solid var(--line);
    background:linear-gradient(150deg, #21262e, #15171d);
    display:flex; align-items:center; gap:10px; padding:0 16px; }
  .layer .tk { font:500 0.78rem/1 var(--font-mono); color:#c6e6cb; }
  .layer .sh { font:400 0.64rem/1.3 var(--font-mono); color:rgba(155,214,159,0.5); }
  .l0 { left:0; bottom:0; width:300px; height:150px; box-shadow:inset 0 0 0 1px rgba(155,214,159,0.05); align-items:flex-end; padding-bottom:12px; }
  .l1 { left:40px; bottom:42px; width:300px; height:78px; box-shadow:0 10px 26px rgba(0,0,0,0.45); }
  .l2 { left:108px; bottom:80px; width:280px; height:62px; box-shadow:0 18px 44px rgba(0,0,0,0.55); }
  .l3 { left:176px; bottom:114px; width:250px; height:54px; border-color:rgba(155,214,159,0.3);
    box-shadow:0 26px 60px rgba(0,0,0,0.6), 0 0 30px rgba(155,214,159,0.16); }
  .badge { display:inline-flex; align-items:center; justify-content:center; width:30px; height:30px; border-radius:7px;
    background:rgba(155,214,159,0.12); color:#9bd69f; font:600 0.78rem/1 var(--font-mono); }
  .l3 .badge { background:#9bd69f; color:#071007; box-shadow:0 0 14px rgba(155,214,159,0.5); }
  .txt { display:flex; flex-direction:column; gap:2px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="layer l0"><div class="txt"><span class="tk">z0 · base surface</span><span class="sh">hairline border only</span></div></div>
    <div class="layer l1"><span class="badge">1</span><div class="txt"><span class="tk">Raised · card</span><span class="sh">0 10 26 ·.45</span></div></div>
    <div class="layer l2"><span class="badge">2</span><div class="txt"><span class="tk">Floating · menu</span><span class="sh">0 18 44 ·.55</span></div></div>
    <div class="layer l3"><span class="badge">3</span><div class="txt"><span class="tk">Overlay · modal</span><span class="sh">0 26 60 ·.60 + signal halo</span></div></div>
  </div>
</body>
</html>
