<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--bg); }
  .stack { display: grid; gap: 14px; }
  .ln { display: flex; align-items: baseline; gap: 14px; }
  .ln em { font-style: normal; font-family: var(--font-mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
</style>
</head>
<body>
  <div class="stack">
    <div class="ln"><h2 style="font-size:2.2rem;">Heading two</h2><em>h2 · opsz28 · wght540</em></div>
    <div class="ln"><h3 style="font-size:1.4rem;">Heading three</h3><em>h3 · 1.406rem</em></div>
    <div class="ln"><p class="lead" style="font-size:1.125rem;color:var(--text);">Lead paragraph — Inter at 18px, the lens-in copy.</p></div>
    <div class="ln"><p style="font-size:1rem;">Body copy in Inter sits at 16px with 1.6 line-height for dense, readable technical prose.</p></div>
  </div>
</body>
</html>
