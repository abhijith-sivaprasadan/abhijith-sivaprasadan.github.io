<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--bg); }
  .grid { display: grid; gap: 13px; }
  .eyebrow { margin: 0; }
  .chip { display:inline-flex; gap:8px; align-items:center; font-family:var(--font-mono); font-size:var(--type-xs); color:var(--muted); }
  .lbl { font-family:var(--font-mono); font-size:11px; color:var(--muted); }
</style>
</head>
<body>
  <div class="grid">
    <p class="eyebrow">CURRENT SNAPSHOT</p>
    <p class="kicker" style="margin:0;">M.Sc. Sustainable Energy Engineering · KTH 2026</p>
    <p class="readout" style="margin:0;color:var(--text);font-size:1.1rem;">Bi = 0.003–0.004 · Ma 0.990 · T = 673 K</p>
    <div style="display:flex;gap:18px;">
      <span class="lbl">ANSYS&nbsp;FLUENT</span>
      <span class="lbl">k-omega&nbsp;SST</span>
      <span class="lbl">NI-DAQ&nbsp;·&nbsp;LABVIEW</span>
    </div>
    <p style="margin:0;font-family:var(--font-mono);font-size:11px;color:var(--muted);">JetBrains Mono — eyebrows, meta, telemetry, labels (UPPERCASE for chrome)</p>
  </div>
</body>
</html>
