<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 18px 20px; background: var(--bg); }
  .ln { display: flex; align-items: baseline; gap: 12px; border-bottom: 1px solid var(--line); padding: 6px 0; }
  .ln em { font-style: normal; font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-left: auto; }
  .ln span:first-child { color: var(--text); white-space: nowrap; overflow: hidden; }
</style>
</head>
<body>
  <div>
    <div class="ln"><span style="font-size:3.434rem;line-height:1;">Aa</span><em>4xl · 3.434rem</em></div>
    <div class="ln"><span style="font-size:2.197rem;">Aa</span><em>2xl · 2.197rem</em></div>
    <div class="ln"><span style="font-size:1.758rem;">Aa</span><em>xl · 1.758rem</em></div>
    <div class="ln"><span style="font-size:1.406rem;">Aa</span><em>lg · 1.406rem</em></div>
    <div class="ln"><span style="font-size:1.125rem;">Aa</span><em>md · 1.125rem</em></div>
    <div class="ln"><span style="font-size:1rem;">Aa</span><em>base · 1rem</em></div>
    <div class="ln"><span style="font-size:0.875rem;">Aa</span><em>sm · 0.875rem</em></div>
    <div class="ln" style="border:none;"><span style="font-size:0.8rem;">Aa</span><em>xs · 0.8rem</em></div>
  </div>
</body>
</html>
