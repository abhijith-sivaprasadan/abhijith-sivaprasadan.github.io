<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Signal UI Kit — Abhijith Sivaprasadan</title>
<link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="kit.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body data-lens="thermal">
  <div id="root"></div>

  <script type="text/babel" src="Bits.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="SignalRail.jsx"></script>
  <script type="text/babel" src="Projects.jsx"></script>
  <script type="text/babel" src="Experience.jsx"></script>
  <script type="text/babel" src="Contact.jsx"></script>
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [lens, setLens] = useState("thermal");
      const [active, setActive] = useState("Signal");

      // re-tint the whole document per active lens
      React.useEffect(() => { document.body.dataset.lens = lens; }, [lens]);

      const onNav = (n) => {
        setActive(n);
        const map = { Projects: "projects-section", Experience: "experience-section", Contact: "contact-section" };
        const el = document.getElementById(map[n]);
        if (el) el.scrollIntoView ? window.scrollTo({ top: el.offsetTop - 70, behavior: "smooth" }) : null;
        else window.scrollTo({ top: 0, behavior: "smooth" });
      };

      return (
        <React.Fragment>
          <StatusBanner />
          <SiteHeader active={active} onNav={onNav} />
          <main>
            <Hero lens={lens} setLens={setLens} />
            <SignalRail />
            <Projects />
            <Experience />
            <Contact />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
