  <text x="374" y="197" font-family="monospace" font-size="10" fill="#d0622c" text-anchor="middle" font-weight="bold">BOILER</text>
  <text x="374" y="218" font-family="monospace" font-size="9" fill="#2a4060" text-anchor="middle">400°C / 40 bar</text>
  <text x="374" y="232" font-family="monospace" font-size="9" fill="#2a4060" text-anchor="middle">η_boiler = 82%</text>
  <text x="374" y="248" font-family="monospace" font-size="8" fill="#2a4060" text-anchor="middle">superheated steam</text>
  <line x1="434" y1="210" x2="456" y2="210" stroke="#d0622c" stroke-width="2" marker-end="url(#aro)"></line>


  <rect x="456" y="156" width="110" height="108" rx="5" fill="#0d1a2e" stroke="#f6c85f" stroke-width="2"></rect>
