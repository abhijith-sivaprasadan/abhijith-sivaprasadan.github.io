<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-label="Waste to energy MSW grate combustion steam turbine process flow recovery">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"></stop><stop offset="1" stop-color="#070c16"></stop>
    </linearGradient>
    <marker id="arr" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#f6c85f"></path>
    </marker>
    <marker id="arb" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#38bdf8"></path>
    </marker>
    <marker id="arg" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#4ade80"></path>
    </marker>
    <marker id="aro" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#d0622c"></path>
    </marker>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"></rect>


  <rect x="24" y="14" width="912" height="36" rx="5" fill="#0d1a2e"></rect>
  <text x="44" y="38" font-family="monospace" font-size="14" fill="#f6c85f" font-weight="bold">WASTE-TO-ENERGY · MSW GRATE COMBUSTION · STEAM CYCLE RECOVERY</text>




  <rect x="30" y="170" width="110" height="80" rx="5" fill="#0d1a2e" stroke="#2a4060" stroke-width="1.5"></rect>
  <text x="85" y="197" font-family="monospace" font-size="10" fill="#c8d8ea" text-anchor="middle" font-weight="bold">MSW</text>
  <text x="85" y="211" font-family="monospace" font-size="10" fill="#c8d8ea" text-anchor="middle" font-weight="bold">PIT</text>
  <text x="85" y="230" font-family="monospace" font-size="9" fill="#2a4060" text-anchor="middle">≈ 400 t/d</text>
  <text x="85" y="244" font-family="monospace" font-size="8" fill="#2a4060" text-anchor="middle">LHV 9 MJ/kg</text>

  <line x1="140" y1="210" x2="162" y2="210" stroke="#f6c85f" stroke-width="2" marker-end="url(#arr)"></line>


  <rect x="162" y="156" width="130" height="108" rx="5" fill="#0d1a2e" stroke="#d0622c" stroke-width="2"></rect>
  <text x="227" y="183" font-family="monospace" font-size="10" fill="#d0622c" text-anchor="middle" font-weight="bold">GRATE</text>
  <text x="227" y="197" font-family="monospace" font-size="10" fill="#d0622c" text-anchor="middle" font-weight="bold">FURNACE</text>
  <text x="227" y="218" font-family="monospace" font-size="9" fill="#2a4060" text-anchor="middle">T ≈ 950°C</text>
  <text x="227" y="232" font-family="monospace" font-size="9" fill="#2a4060" text-anchor="middle">P = 50 MW_th</text>
  <text x="227" y="252" font-family="monospace" font-size="8" fill="#2a4060" text-anchor="middle">two-stage combustion</text>

  <line x1="292" y1="210" x2="314" y2="210" stroke="#f6c85f" stroke-width="2" marker-end="url(#arr)"></line>


  <rect x="182" y="295" width="90" height="36" rx="3" fill="#0f2240" stroke="#38bdf8" stroke-width="1"></rect>
  <text x="227" y="313" font-family="monospace" font-size="9" fill="#38bdf8" text-anchor="middle">Primary air</text>
  <text x="227" y="326" font-family="monospace" font-size="8" fill="#2a4060" text-anchor="middle">+ secondary air</text>
  <line x1="227" y1="295" x2="227" y2="264" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arb)"></line>


  <rect x="314" y="156" width="120" height="108" rx="5" fill="#0d1a2e" stroke="#d0622c" stroke-width="1.5"></rect>
