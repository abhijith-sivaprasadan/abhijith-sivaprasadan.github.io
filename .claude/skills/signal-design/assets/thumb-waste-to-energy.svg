  <text x="511" y="197" font-family="monospace" font-size="10" fill="#f6c85f" text-anchor="middle" font-weight="bold">TURBINE</text>
  <text x="511" y="218" font-family="monospace" font-size="9" fill="#2a4060" text-anchor="middle">condensing/backp.</text>
  <text x="511" y="232" font-family="monospace" font-size="9" fill="#2a4060" text-anchor="middle">P_mech ≈ 14 MW</text>
  <line x1="566" y1="210" x2="588" y2="210" stroke="#f6c85f" stroke-width="2" marker-end="url(#arr)"></line>


  <rect x="588" y="170" width="100" height="80" rx="5" fill="#0d1a2e" stroke="#4ade80" stroke-width="1.5"></rect>
  <text x="638" y="197" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="middle" font-weight="bold">GENERATOR</text>
  <text x="638" y="215" font-family="monospace" font-size="9" fill="#2a4060" text-anchor="middle">η = 96%</text>
  <text x="638" y="232" font-family="monospace" font-size="9" fill="#2a4060" text-anchor="middle">~13.4 MW_e</text>
  <line x1="688" y1="210" x2="710" y2="210" stroke="#4ade80" stroke-width="2" marker-end="url(#arg)"></line>


  <rect x="710" y="170" width="90" height="80" rx="5" fill="#0d1a2e" stroke="#4ade80" stroke-width="1.5"></rect>
  <text x="755" y="203" font-family="monospace" font-size="10" fill="#4ade80" text-anchor="middle" font-weight="bold">GRID</text>
  <text x="755" y="220" font-family="monospace" font-size="9" fill="#2a4060" text-anchor="middle">export</text>


  <line x1="227" y1="156" x2="227" y2="110" stroke="#8f7fff" stroke-width="1.5" marker-end="url(#arr)"></line>
  <text x="186" y="108" font-family="monospace" font-size="9" fill="#8f7fff">flue gas</text>


  <line x1="227" y1="110" x2="580" y2="110" stroke="#8f7fff" stroke-width="1.5"></line>

  <rect x="320" y="90" width="64" height="36" rx="3" fill="#0f2240" stroke="#8f7fff" stroke-width="1"></rect>
  <text x="352" y="107" font-family="monospace" font-size="9" fill="#8f7fff" text-anchor="middle">ESP</text>
  <text x="352" y="120" font-family="monospace" font-size="8" fill="#2a4060" text-anchor="middle">particulate</text>

  <line x1="352" y1="126" x2="352" y2="148" stroke="#2a4060" stroke-width="1" stroke-dasharray="3,2"></line>
  <text x="358" y="146" font-family="monospace" font-size="7" fill="#2a4060">fly ash</text>


  <rect x="430" y="90" width="80" height="36" rx="3" fill="#0f2240" stroke="#8f7fff" stroke-width="1"></rect>
  <text x="470" y="107" font-family="monospace" font-size="9" fill="#8f7fff" text-anchor="middle">SCRUBBER</text>
  <text x="470" y="120" font-family="monospace" font-size="8" fill="#2a4060" text-anchor="middle">HCl/SO₂/NOₓ</text>


  <line x1="580" y1="110" x2="620" y2="110" stroke="#8f7fff" stroke-width="1.5"></line>
  <rect x="620" y="82" width="40" height="56" rx="2" fill="#0f2240" stroke="#8f7fff" stroke-width="1.5"></rect>
  <line x1="640" y1="82" x2="640" y2="62" stroke="#8f7fff" stroke-width="2" stroke-dasharray="3,2"></line>
  <text x="640" y="58" font-family="monospace" font-size="8" fill="#8f7fff" text-anchor="middle">stack</text>
  <text x="640" y="104" font-family="monospace" font-size="8" fill="#2a4060" text-anchor="middle">STACK</text>


  <line x1="227" y1="264" x2="227" y2="295" stroke="#2a4060" stroke-width="1" stroke-dasharray="3,2"></line>
  <rect x="175" y="295" width="104" height="30" rx="3" fill="#0f2240" stroke="#2a4060" stroke-width="1"></rect>
  <text x="227" y="315" font-family="monospace" font-size="8" fill="#2a4060" text-anchor="middle">bottom ash → slag treatment</text>


  <line x1="511" y1="264" x2="511" y2="310" stroke="#38bdf8" stroke-width="1.5"></line>
  <line x1="511" y1="310" x2="374" y2="310" stroke="#38bdf8" stroke-width="1.5"></line>
  <line x1="374" y1="310" x2="374" y2="264" stroke="#38bdf8" stroke-width="1.5" marker-end="url(#arb)"></line>
  <text x="442" y="326" font-family="monospace" font-size="8" fill="#38bdf8" text-anchor="middle">condensate return</text>


  <rect x="30" y="370" width="900" height="100" rx="6" fill="#0d1a2e" stroke="#152540" stroke-width="1"></rect>
  <text x="480" y="392" font-family="monospace" font-size="11" fill="#c8d8ea" text-anchor="middle" font-weight="bold">ENERGY AND MASS BALANCE</text>

  <rect x="50" y="406" width="180" height="18" rx="3" fill="#d0622c" opacity="0.6"></rect>
  <text x="140" y="419" font-family="monospace" font-size="9" fill="#d0622c" text-anchor="middle">Thermal input 50 MW</text>

  <rect x="250" y="406" width="108" height="18" rx="3" fill="#4ade80" opacity="0.6"></rect>
  <text x="304" y="419" font-family="monospace" font-size="9" fill="#4ade80" text-anchor="middle">Electrical 13.4 MW</text>

  <rect x="376" y="406" width="100" height="18" rx="3" fill="#f6c85f" opacity="0.6"></rect>
  <text x="426" y="419" font-family="monospace" font-size="9" fill="#f6c85f" text-anchor="middle">DH 22 MW</text>

  <rect x="494" y="406" width="90" height="18" rx="3" fill="#2a4060" opacity="0.8"></rect>
  <text x="539" y="419" font-family="monospace" font-size="9" fill="#c8d8ea" text-anchor="middle">Losses 14.6 MW</text>

  <text x="620" y="419" font-family="monospace" font-size="9" fill="#65d6c9">η_el = 26.8%  ·  η_total = 71%</text>

  <text x="50" y="450" font-family="monospace" font-size="9" fill="#2a4060">Diversion from landfill: ~100% · CO₂ (fossil): ~900 kg/t MSW · CHP-mode operation</text>


  <rect x="24" y="490" width="912" height="34" rx="5" fill="#0d1a2e"></rect>
  <text x="44" y="512" font-family="monospace" font-size="11" fill="#2a4060">MSW · Grate combustion · Steam turbine · Flue gas treatment · CHP · WtE · Energy recovery</text>
</svg>
