  <text x="62" y="104" fill="#a8ada4" class="label" font-size="15">Energy performance mapping</text>
    <g>
    <path class="dash" d="M112 330 C220 230 334 270 448 210 C570 146 706 188 848 120"/>
    <path class="dash amber" d="M112 370 C248 328 340 346 470 302 C608 256 724 280 848 230"/>
