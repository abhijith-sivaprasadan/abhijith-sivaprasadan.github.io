<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='Backend API data pipeline authentication admin dashboard architecture'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
    <marker id='arr' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#38bdf8'/>
    </marker>
    <marker id='arg' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#4ade80'/>
    </marker>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>

  <!-- Title bar -->
  <rect x='24' y='14' width='912' height='36' rx='5' fill='#0d1a2e'/>
  <text x='44' y='38' font-family='monospace' font-size='14' fill='#38bdf8' font-weight='bold'>BACKEND API · DATA PIPELINE · AUTH + ADMIN ARCHITECTURE</text>

  <!-- Left panel: endpoint route tree -->
  <rect x='30' y='64' width='440' height='420' rx='4' fill='#0d1a2e'/>
  <text x='250' y='86' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>API ENDPOINT TREE</text>

  <!-- Root -->
  <text x='56' y='112' font-family='monospace' font-size='10' fill='#65d6c9' font-weight='bold'>/api  v1</text>

  <!-- Auth branch -->
  <line x1='66' y1='120' x2='66' y2='175' stroke='#2a4060' stroke-width='1'/>
  <line x1='66' y1='135' x2='86' y2='135' stroke='#2a4060' stroke-width='1'/>
  <text x='90' y='139' font-family='monospace' font-size='9' fill='#f6c85f' font-weight='bold'>/auth</text>

  <line x1='100' y1='145' x2='100' y2='175' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='100' y1='152' x2='118' y2='152' stroke='#2a4060' stroke-width='0.8'/>
  <rect x='118' y='143' width='42' height='16' rx='2' fill='#0f3820' stroke='#4ade80' stroke-width='0.8'/>
  <text x='139' y='154' font-family='monospace' font-size='8' fill='#4ade80' text-anchor='middle'>POST</text>
  <text x='166' y='154' font-family='monospace' font-size='9' fill='#c8d8ea'>/register</text>

  <line x1='100' y1='168' x2='118' y2='168' stroke='#2a4060' stroke-width='0.8'/>
  <rect x='118' y='159' width='42' height='16' rx='2' fill='#0f3820' stroke='#4ade80' stroke-width='0.8'/>
  <text x='139' y='170' font-family='monospace' font-size='8' fill='#4ade80' text-anchor='middle'>POST</text>
  <text x='166' y='170' font-family='monospace' font-size='9' fill='#c8d8ea'>/login</text>
  <text x='280' y='170' font-family='monospace' font-size='8' fill='#f6c85f'>JWT issued</text>

  <!-- Users branch -->
  <line x1='66' y1='175' x2='86' y2='175' stroke='#2a4060' stroke-width='1'/>
  <text x='90' y='179' font-family='monospace' font-size='9' fill='#38bdf8' font-weight='bold'>/users</text>
  <text x='180' y='179' font-family='monospace' font-size='8' fill='#f6c85f'>🔒 admin</text>

  <line x1='100' y1='185' x2='100' y2='235' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='100' y1='192' x2='118' y2='192' stroke='#2a4060' stroke-width='0.8'/>
  <rect x='118' y='183' width='34' height='16' rx='2' fill='#0f3040' stroke='#65d6c9' stroke-width='0.8'/>
  <text x='135' y='194' font-family='monospace' font-size='8' fill='#65d6c9' text-anchor='middle'>GET</text>
  <text x='158' y='194' font-family='monospace' font-size='9' fill='#c8d8ea'>/users  (list, paginated)</text>

  <line x1='100' y1='208' x2='118' y2='208' stroke='#2a4060' stroke-width='0.8'/>
  <rect x='118' y='199' width='34' height='16' rx='2' fill='#0f3040' stroke='#65d6c9' stroke-width='0.8'/>
  <text x='135' y='210' font-family='monospace' font-size='8' fill='#65d6c9' text-anchor='middle'>GET</text>
  <text x='158' y='210' font-family='monospace' font-size='9' fill='#c8d8ea'>/users/:id</text>

  <line x1='100' y1='224' x2='118' y2='224' stroke='#2a4060' stroke-width='0.8'/>
  <rect x='118' y='215' width='50' height='16' rx='2' fill='#2a1a00' stroke='#f6c85f' stroke-width='0.8'/>
  <text x='143' y='226' font-family='monospace' font-size='8' fill='#f6c85f' text-anchor='middle'>PATCH</text>
  <text x='174' y='226' font-family='monospace' font-size='9' fill='#c8d8ea'>/users/:id/role</text>

  <!-- Data/reports branch -->
  <line x1='66' y1='175' x2='66' y2='255' stroke='#2a4060' stroke-width='1'/>
  <line x1='66' y1='255' x2='86' y2='255' stroke='#2a4060' stroke-width='1'/>
  <text x='90' y='259' font-family='monospace' font-size='9' fill='#38bdf8' font-weight='bold'>/data</text>

  <line x1='100' y1='265' x2='100' y2='315' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='100' y1='272' x2='118' y2='272' stroke='#2a4060' stroke-width='0.8'/>
  <rect x='118' y='263' width='34' height='16' rx='2' fill='#0f3040' stroke='#65d6c9' stroke-width='0.8'/>
  <text x='135' y='274' font-family='monospace' font-size='8' fill='#65d6c9' text-anchor='middle'>GET</text>
  <text x='158' y='274' font-family='monospace' font-size='9' fill='#c8d8ea'>/data/metrics?from=&amp;to=</text>

  <line x1='100' y1='288' x2='118' y2='288' stroke='#2a4060' stroke-width='0.8'/>
  <rect x='118' y='279' width='34' height='16' rx='2' fill='#0f3040' stroke='#65d6c9' stroke-width='0.8'/>
  <text x='135' y='290' font-family='monospace' font-size='8' fill='#65d6c9' text-anchor='middle'>GET</text>
  <text x='158' y='290' font-family='monospace' font-size='9' fill='#c8d8ea'>/data/export  (CSV/XLSX)</text>

  <line x1='100' y1='304' x2='118' y2='304' stroke='#2a4060' stroke-width='0.8'/>
  <rect x='118' y='295' width='42' height='16' rx='2' fill='#0f3820' stroke='#4ade80' stroke-width='0.8'/>
  <text x='139' y='306' font-family='monospace' font-size='8' fill='#4ade80' text-anchor='middle'>POST</text>
  <text x='166' y='306' font-family='monospace' font-size='9' fill='#c8d8ea'>/data/ingest  (batch)</text>

  <!-- Upload branch -->
  <line x1='66' y1='255' x2='66' y2='335' stroke='#2a4060' stroke-width='1'/>
  <line x1='66' y1='335' x2='86' y2='335' stroke='#2a4060' stroke-width='1'/>
  <text x='90' y='339' font-family='monospace' font-size='9' fill='#38bdf8' font-weight='bold'>/upload</text>

  <line x1='100' y1='345' x2='118' y2='345' stroke='#2a4060' stroke-width='0.8'/>
  <rect x='118' y='336' width='42' height='16' rx='2' fill='#0f3820' stroke='#4ade80' stroke-width='0.8'/>
  <text x='139' y='347' font-family='monospace' font-size='8' fill='#4ade80' text-anchor='middle'>POST</text>
  <text x='166' y='347' font-family='monospace' font-size='9' fill='#c8d8ea'>/upload/file  (multipart)</text>

  <!-- Admin branch -->
  <line x1='66' y1='335' x2='66' y2='385' stroke='#2a4060' stroke-width='1'/>
  <line x1='66' y1='385' x2='86' y2='385' stroke='#2a4060' stroke-width='1'/>
  <text x='90' y='389' font-family='monospace' font-size='9' fill='#8f7fff' font-weight='bold'>/admin</text>
  <text x='170' y='389' font-family='monospace' font-size='8' fill='#d0622c'>🔒 superadmin</text>

  <line x1='100' y1='395' x2='100' y2='425' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='100' y1='402' x2='118' y2='402' stroke='#2a4060' stroke-width='0.8'/>
  <rect x='118' y='393' width='34' height='16' rx='2' fill='#0f3040' stroke='#65d6c9' stroke-width='0.8'/>
  <text x='135' y='404' font-family='monospace' font-size='8' fill='#65d6c9' text-anchor='middle'>GET</text>
  <text x='158' y='404' font-family='monospace' font-size='9' fill='#c8d8ea'>/admin/logs</text>

  <line x1='100' y1='418' x2='118' y2='418' stroke='#2a4060' stroke-width='0.8'/>
  <rect x='118' y='409' width='56' height='16' rx='2' fill='#2a0a08' stroke='#d0622c' stroke-width='0.8'/>
  <text x='146' y='420' font-family='monospace' font-size='8' fill='#d0622c' text-anchor='middle'>DELETE</text>
  <text x='180' y='420' font-family='monospace' font-size='9' fill='#c8d8ea'>/admin/cache</text>

  <!-- Right panel: architecture + pipeline -->
  <rect x='488' y='64' width='460' height='420' rx='4' fill='#0d1a2e'/>
  <text x='718' y='86' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>BACKEND ARCHITECTURE</text>

  <!-- Vertical stack: Client → Guard → Service → Repository → DB + Cache -->
  <!-- Request flow arrow on the left -->
  <line x1='510' y1='108' x2='510' y2='430' stroke='#152540' stroke-width='0.8'/>

  <!-- Client -->
  <rect x='520' y='100' width='90' height='36' rx='4' fill='#0f2240' stroke='#2a4060' stroke-width='1.5'/>
  <text x='565' y='121' font-family='monospace' font-size='10' fill='#c8d8ea' text-anchor='middle'>Client</text>

  <!-- Down arrow -->
  <line x1='565' y1='136' x2='565' y2='148' stroke='#38bdf8' stroke-width='1.5' marker-end='url(#arr)'/>

  <!-- JWT Guard -->
  <rect x='520' y='148' width='90' height='36' rx='4' fill='#2a1a00' stroke='#f6c85f' stroke-width='1.5'/>
  <text x='565' y='163' font-family='monospace' font-size='9' fill='#f6c85f' text-anchor='middle' font-weight='bold'>JWT Guard</text>
  <text x='565' y='178' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>+ RBAC roles</text>

  <!-- Down arrow -->
  <line x1='565' y1='184' x2='565' y2='196' stroke='#38bdf8' stroke-width='1.5' marker-end='url(#arr)'/>

  <!-- Controller -->
  <rect x='520' y='196' width='90' height='36' rx='4' fill='#0d3860' stroke='#38bdf8' stroke-width='1.5'/>
  <text x='565' y='211' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle' font-weight='bold'>Controller</text>
  <text x='565' y='226' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>DTO validation</text>

  <!-- Down arrow -->
  <line x1='565' y1='232' x2='565' y2='244' stroke='#38bdf8' stroke-width='1.5' marker-end='url(#arr)'/>

  <!-- Service -->
  <rect x='520' y='244' width='90' height='36' rx='4' fill='#0d2840' stroke='#65d6c9' stroke-width='1.5'/>
  <text x='565' y='259' font-family='monospace' font-size='9' fill='#65d6c9' text-anchor='middle' font-weight='bold'>Service</text>
  <text x='565' y='274' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>business logic</text>

  <!-- Arrow to cache and DB -->
  <line x1='565' y1='280' x2='565' y2='292' stroke='#38bdf8' stroke-width='1.5' marker-end='url(#arr)'/>

  <!-- Repository -->
  <rect x='520' y='292' width='90' height='36' rx='4' fill='#0f2240' stroke='#8f7fff' stroke-width='1.5'/>
  <text x='565' y='307' font-family='monospace' font-size='9' fill='#8f7fff' text-anchor='middle' font-weight='bold'>Repository</text>
  <text x='565' y='322' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>TypeORM pattern</text>

  <!-- DB + Cache arrows -->
  <line x1='565' y1='328' x2='565' y2='352' stroke='#38bdf8' stroke-width='1.5' marker-end='url(#arr)'/>

  <!-- PostgreSQL -->
  <rect x='520' y='352' width='90' height='36' rx='4' fill='#0f2240' stroke='#4ade80' stroke-width='1.5'/>
  <text x='565' y='367' font-family='monospace' font-size='9' fill='#4ade80' text-anchor='middle' font-weight='bold'>PostgreSQL</text>
  <text x='565' y='382' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>primary store</text>

  <!-- Redis cache (side branch) -->
  <rect x='640' y='244' width='80' height='50' rx='4' fill='#0f2240' stroke='#d0622c' stroke-width='1.2'/>
  <text x='680' y='264' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle' font-weight='bold'>Redis</text>
  <text x='680' y='280' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>cache + sessions</text>
  <line x1='610' y1='262' x2='640' y2='262' stroke='#d0622c' stroke-width='1.2' stroke-dasharray='3,2'/>
  <text x='625' y='258' font-family='monospace' font-size='8' fill='#d0622c' text-anchor='middle'>TTL</text>

  <!-- Background job queue -->
  <rect x='640' y='318' width='80' height='50' rx='4' fill='#0f2240' stroke='#f6c85f' stroke-width='1.2'/>
  <text x='680' y='338' font-family='monospace' font-size='9' fill='#f6c85f' text-anchor='middle' font-weight='bold'>Job Queue</text>
  <text x='680' y='354' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>Bull + Redis</text>
  <line x1='610' y1='300' x2='640' y2='335' stroke='#f6c85f' stroke-width='1.2' stroke-dasharray='3,2'/>

  <!-- Logging / monitoring -->
  <rect x='640' y='392' width='80' height='36' rx='4' fill='#0f2240' stroke='#2a4060' stroke-width='1'/>
  <text x='680' y='410' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>Logger</text>
  <text x='680' y='424' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>Winston + ELK</text>

  <!-- Tech stack summary -->
  <rect x='740' y='100' width='200' height='120' rx='4' fill='#0f2240' stroke='#152540' stroke-width='1'/>
  <text x='840' y='120' font-family='monospace' font-size='10' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>TECH STACK</text>
  <text x='752' y='140' font-family='monospace' font-size='9' fill='#38bdf8'>Runtime: Node.js 20</text>
  <text x='752' y='158' font-family='monospace' font-size='9' fill='#38bdf8'>Framework: NestJS 10</text>
  <text x='752' y='176' font-family='monospace' font-size='9' fill='#8f7fff'>ORM: TypeORM 0.3</text>
  <text x='752' y='194' font-family='monospace' font-size='9' fill='#4ade80'>DB: PostgreSQL 15</text>
  <text x='752' y='212' font-family='monospace' font-size='9' fill='#d0622c'>Cache: Redis 7</text>

  <!-- CI/CD box -->
  <rect x='740' y='234' width='200' height='90' rx='4' fill='#0f2240' stroke='#4ade80' stroke-width='1'/>
  <text x='840' y='254' font-family='monospace' font-size='10' fill='#4ade80' text-anchor='middle' font-weight='bold'>CI/CD PIPELINE</text>
  <text x='752' y='272' font-family='monospace' font-size='9' fill='#2a4060'>GitHub Actions → lint + test</text>
  <text x='752' y='288' font-family='monospace' font-size='9' fill='#2a4060'>Docker build → ECR push</text>
  <text x='752' y='304' font-family='monospace' font-size='9' fill='#2a4060'>ECS deploy → health check</text>
  <text x='752' y='320' font-family='monospace' font-size='9' fill='#4ade80'>Zero-downtime rolling update</text>

  <!-- Test coverage -->
  <rect x='740' y='340' width='200' height='60' rx='4' fill='#0f2240' stroke='#f6c85f' stroke-width='1'/>
  <text x='840' y='360' font-family='monospace' font-size='10' fill='#f6c85f' text-anchor='middle' font-weight='bold'>TEST COVERAGE</text>
  <text x='752' y='378' font-family='monospace' font-size='9' fill='#2a4060'>Unit: 89%  ·  E2E: 74%</text>
  <text x='752' y='394' font-family='monospace' font-size='9' fill='#2a4060'>Postman: 54 scenarios</text>

  <!-- Bottom tag strip -->
  <rect x='24' y='490' width='912' height='34' rx='5' fill='#0d1a2e'/>
  <text x='44' y='512' font-family='monospace' font-size='11' fill='#2a4060'>NestJS · REST · JWT · RBAC · Redis · PostgreSQL · Bull queue · Docker · GitHub Actions</text>
</svg>
