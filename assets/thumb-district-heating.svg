<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='District heating network dispatch optimisation'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
    <marker id='arr' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#38bdf8'/>
    </marker>
    <marker id='aro' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#d0622c'/>
    </marker>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>

  <!-- Title bar -->
  <rect x='24' y='14' width='912' height='36' rx='5' fill='#0d1a2e'/>
  <text x='44' y='38' font-family='monospace' font-size='14' fill='#65d6c9' font-weight='bold'>DISTRICT HEATING NETWORK · MULTI-ASSET DISPATCH OPTIMISATION</text>

  <!-- Network topology (left half) -->
  <!-- Main supply pipe (red/orange = hot) -->
  <line x1='50' y1='200' x2='480' y2='200' stroke='#d0622c' stroke-width='4'/>
  <!-- Return pipe (blue = cool) -->
  <line x1='50' y1='230' x2='480' y2='230' stroke='#38bdf8' stroke-width='4'/>

  <!-- Supply/return labels -->
  <text x='56' y='192' font-family='monospace' font-size='10' fill='#d0622c'>supply 85°C</text>
  <text x='56' y='248' font-family='monospace' font-size='10' fill='#38bdf8'>return 45°C</text>

  <!-- Production node: Gas boiler -->
  <rect x='50' y='130' width='100' height='60' rx='6' fill='#0d1a2e' stroke='#d0622c' stroke-width='2'/>
  <text x='100' y='156' font-family='monospace' font-size='11' fill='#d0622c' text-anchor='middle' font-weight='bold'>GAS</text>
  <text x='100' y='170' font-family='monospace' font-size='11' fill='#d0622c' text-anchor='middle' font-weight='bold'>BOILER</text>
  <line x1='100' y1='190' x2='100' y2='200' stroke='#d0622c' stroke-width='3'/>
  <line x1='100' y1='230' x2='100' y2='240' stroke='#38bdf8' stroke-width='3'/>

  <!-- Production node: CHP -->
  <rect x='180' y='130' width='100' height='60' rx='6' fill='#0d1a2e' stroke='#f6c85f' stroke-width='2'/>
  <text x='230' y='156' font-family='monospace' font-size='11' fill='#f6c85f' text-anchor='middle' font-weight='bold'>CHP</text>
  <text x='230' y='170' font-family='monospace' font-size='11' fill='#f6c85f' text-anchor='middle' font-weight='bold'>UNIT</text>
  <line x1='230' y1='190' x2='230' y2='200' stroke='#d0622c' stroke-width='3'/>
  <line x1='230' y1='230' x2='230' y2='240' stroke='#38bdf8' stroke-width='3'/>
  <!-- CHP electricity arrow -->
  <line x1='280' y1='160' x2='310' y2='140' stroke='#f6c85f' stroke-width='1.5' marker-end='url(#arr)' stroke-dasharray='4,3'/>
  <text x='316' y='135' font-family='monospace' font-size='9' fill='#f6c85f'>elec →</text>

  <!-- Production node: Heat pump -->
  <rect x='310' y='130' width='100' height='60' rx='6' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <text x='360' y='153' font-family='monospace' font-size='11' fill='#65d6c9' text-anchor='middle' font-weight='bold'>HEAT</text>
  <text x='360' y='167' font-family='monospace' font-size='11' fill='#65d6c9' text-anchor='middle' font-weight='bold'>PUMP</text>
  <line x1='360' y1='190' x2='360' y2='200' stroke='#d0622c' stroke-width='3'/>
  <line x1='360' y1='230' x2='360' y2='240' stroke='#38bdf8' stroke-width='3'/>

  <!-- Load nodes (branch pipes going down) -->
  <!-- Load A -->
  <line x1='160' y1='200' x2='160' y2='280' stroke='#d0622c' stroke-width='2'/>
  <line x1='160' y1='310' x2='160' y2='230' stroke='#38bdf8' stroke-width='2'/>
  <rect x='130' y='280' width='60' height='38' rx='4' fill='#0d1a2e' stroke='#8f7fff' stroke-width='1.5'/>
  <text x='160' y='298' font-family='monospace' font-size='10' fill='#8f7fff' text-anchor='middle'>Load A</text>
  <text x='160' y='310' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>180 kW</text>

  <!-- Load B -->
  <line x1='280' y1='200' x2='280' y2='280' stroke='#d0622c' stroke-width='2'/>
  <line x1='280' y1='310' x2='280' y2='230' stroke='#38bdf8' stroke-width='2'/>
  <rect x='250' y='280' width='60' height='38' rx='4' fill='#0d1a2e' stroke='#8f7fff' stroke-width='1.5'/>
  <text x='280' y='298' font-family='monospace' font-size='10' fill='#8f7fff' text-anchor='middle'>Load B</text>
  <text x='280' y='310' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>260 kW</text>

  <!-- Load C -->
  <line x1='420' y1='200' x2='420' y2='280' stroke='#d0622c' stroke-width='2'/>
  <line x1='420' y1='310' x2='420' y2='230' stroke='#38bdf8' stroke-width='2'/>
  <rect x='390' y='280' width='60' height='38' rx='4' fill='#0d1a2e' stroke='#8f7fff' stroke-width='1.5'/>
  <text x='420' y='298' font-family='monospace' font-size='10' fill='#8f7fff' text-anchor='middle'>Load C</text>
  <text x='420' y='310' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>140 kW</text>

  <!-- Dispatch chart (right half) -->
  <rect x='510' y='78' width='424' height='380' rx='6' fill='#0d1a2e' stroke='#152540' stroke-width='1'/>
  <text x='722' y='100' font-family='monospace' font-size='12' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>HOURLY DISPATCH  [MW]</text>

  <!-- Chart axes -->
  <line x1='560' y1='120' x2='560' y2='420' stroke='#2a4060' stroke-width='1.2'/>
  <line x1='560' y1='420' x2='910' y2='420' stroke='#2a4060' stroke-width='1.2'/>

  <!-- Y-axis ticks -->
  <line x1='555' y1='370' x2='560' y2='370' stroke='#2a4060' stroke-width='1'/>
  <line x1='555' y1='310' x2='560' y2='310' stroke='#2a4060' stroke-width='1'/>
  <line x1='555' y1='250' x2='560' y2='250' stroke='#2a4060' stroke-width='1'/>
  <line x1='555' y1='190' x2='560' y2='190' stroke='#2a4060' stroke-width='1'/>
  <line x1='555' y1='130' x2='560' y2='130' stroke='#2a4060' stroke-width='1'/>
  <text x='550' y='374' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>0.2</text>
  <text x='550' y='314' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>0.4</text>
  <text x='550' y='254' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>0.6</text>
  <text x='550' y='194' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>0.8</text>
  <text x='550' y='134' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>1.0</text>

  <!-- X-axis labels (hours 0-24) -->
  <text x='560' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>0h</text>
  <text x='648' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>6h</text>
  <text x='736' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>12h</text>
  <text x='824' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>18h</text>
  <text x='910' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>24h</text>

  <!-- Stacked dispatch bars (each bar = 1 hour, 14.6px wide) -->
  <!-- Night hours (0-6): boiler dominant -->
  <!-- Bars: x positions 560 to 910, 24 bars = 14.6px each -->
  <!-- I'll draw simplified stacked bars: 8 time slots -->
  <!-- Slot 1 (0-3h): x=560-603 -->
  <rect x='562' y='330' width='40' height='90' fill='#d0622c' opacity='0.8'/> <!-- boiler high -->
  <rect x='562' y='310' width='40' height='20' fill='#f6c85f' opacity='0.7'/> <!-- CHP -->
  <!-- Slot 2 (3-6h): x=605-647 -->
  <rect x='606' y='345' width='40' height='75' fill='#d0622c' opacity='0.8'/>
  <rect x='606' y='325' width='40' height='20' fill='#f6c85f' opacity='0.7'/>
  <!-- Slot 3 (6-9h): morning ramp up -->
  <rect x='650' y='290' width='40' height='130' fill='#d0622c' opacity='0.8'/>
  <rect x='650' y='268' width='40' height='22' fill='#f6c85f' opacity='0.7'/>
  <rect x='650' y='248' width='40' height='20' fill='#65d6c9' opacity='0.7'/> <!-- HP -->
  <!-- Slot 4 (9-12h): peak -->
  <rect x='694' y='190' width='40' height='230' fill='#d0622c' opacity='0.8'/>
  <rect x='694' y='168' width='40' height='22' fill='#f6c85f' opacity='0.7'/>
  <rect x='694' y='148' width='40' height='20' fill='#65d6c9' opacity='0.7'/>
  <!-- Slot 5 (12-15h): mid-day mix -->
  <rect x='738' y='240' width='40' height='180' fill='#d0622c' opacity='0.8'/>
  <rect x='738' y='220' width='40' height='20' fill='#f6c85f' opacity='0.7'/>
  <rect x='738' y='200' width='40' height='20' fill='#65d6c9' opacity='0.7'/>
  <!-- Slot 6 (15-18h): afternoon -->
  <rect x='782' y='220' width='40' height='200' fill='#d0622c' opacity='0.8'/>
  <rect x='782' y='198' width='40' height='22' fill='#f6c85f' opacity='0.7'/>
  <rect x='782' y='178' width='40' height='20' fill='#65d6c9' opacity='0.7'/>
  <!-- Slot 7 (18-21h): evening peak -->
  <rect x='826' y='200' width='40' height='220' fill='#d0622c' opacity='0.8'/>
  <rect x='826' y='178' width='40' height='22' fill='#f6c85f' opacity='0.7'/>
  <rect x='826' y='158' width='40' height='20' fill='#65d6c9' opacity='0.7'/>
  <!-- Slot 8 (21-24h): night wind-down -->
  <rect x='870' y='300' width='40' height='120' fill='#d0622c' opacity='0.8'/>
  <rect x='870' y='278' width='40' height='22' fill='#f6c85f' opacity='0.7'/>

  <!-- Legend -->
  <rect x='565' y='126' width='12' height='10' fill='#d0622c' opacity='0.8'/>
  <text x='582' y='136' font-family='monospace' font-size='9' fill='#d0622c'>Gas boiler</text>
  <rect x='645' y='126' width='12' height='10' fill='#f6c85f' opacity='0.8'/>
  <text x='662' y='136' font-family='monospace' font-size='9' fill='#f6c85f'>CHP</text>
  <rect x='695' y='126' width='12' height='10' fill='#65d6c9' opacity='0.8'/>
  <text x='712' y='136' font-family='monospace' font-size='9' fill='#65d6c9'>Heat pump</text>

  <!-- Bottom tag strip -->
  <rect x='24' y='490' width='912' height='34' rx='5' fill='#0d1a2e'/>
  <text x='44' y='512' font-family='monospace' font-size='11' fill='#2a4060'>District heating · Multi-source dispatch · Supply/return temperature · Pyomo LP · Cost optimisation</text>
</svg>
