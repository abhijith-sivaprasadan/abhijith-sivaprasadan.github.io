<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='Structural truss analysis member forces tension compression CAD mechanical design'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
    <marker id='arload' markerWidth='8' markerHeight='7' refX='7' refY='3.5' orient='auto'>
      <path d='M0,0 L0,7 L8,3.5 z' fill='#f6c85f'/>
    </marker>
    <marker id='arreact' markerWidth='7' markerHeight='6' refX='0' refY='3' orient='auto'>
      <path d='M7,0 L7,6 L0,3 z' fill='#4ade80'/>
    </marker>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>

  <!-- Title bar -->
  <rect x='24' y='14' width='912' height='36' rx='5' fill='#0d1a2e'/>
  <text x='44' y='38' font-family='monospace' font-size='14' fill='#38bdf8' font-weight='bold'>MECHANICAL DESIGN · WARREN TRUSS · FEM MEMBER FORCE ANALYSIS</text>

  <!-- Left panel: truss diagram -->
  <rect x='30' y='64' width='580' height='420' rx='4' fill='#0d1a2e'/>
  <text x='320' y='86' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>WARREN TRUSS — MEMBER FORCES UNDER POINT LOADS</text>

  <!-- Node positions (Warren truss, 6 bottom + 5 top nodes) -->
  <!-- Bottom: B0(60,390) B1(160,390) B2(260,390) B3(360,390) B4(460,390) B5(560,390) -->
  <!-- Top:    T1(110,240) T2(210,240) T3(310,240) T4(410,240) T5(510,240) -->

  <!-- BOTTOM CHORD (tension, blue) -->
  <line x1='60' y1='390' x2='160' y2='390' stroke='#38bdf8' stroke-width='4'/>
  <line x1='160' y1='390' x2='260' y2='390' stroke='#38bdf8' stroke-width='4'/>
  <line x1='260' y1='390' x2='360' y2='390' stroke='#38bdf8' stroke-width='4'/>
  <line x1='360' y1='390' x2='460' y2='390' stroke='#38bdf8' stroke-width='4'/>
  <line x1='460' y1='390' x2='560' y2='390' stroke='#38bdf8' stroke-width='4'/>

  <!-- TOP CHORD (compression, orange) -->
  <line x1='110' y1='240' x2='210' y2='240' stroke='#d0622c' stroke-width='4'/>
  <line x1='210' y1='240' x2='310' y2='240' stroke='#d0622c' stroke-width='4'/>
  <line x1='310' y1='240' x2='410' y2='240' stroke='#d0622c' stroke-width='4'/>
  <line x1='410' y1='240' x2='510' y2='240' stroke='#d0622c' stroke-width='4'/>

  <!-- END INCLINED MEMBERS (compression) -->
  <line x1='60' y1='390' x2='110' y2='240' stroke='#d0622c' stroke-width='3.5'/>
  <line x1='560' y1='390' x2='510' y2='240' stroke='#d0622c' stroke-width='3.5'/>

  <!-- ASCENDING DIAGONALS (tension, blue) -->
  <line x1='160' y1='390' x2='210' y2='240' stroke='#38bdf8' stroke-width='2.5'/>
  <line x1='260' y1='390' x2='310' y2='240' stroke='#38bdf8' stroke-width='2.5'/>
  <line x1='360' y1='390' x2='410' y2='240' stroke='#38bdf8' stroke-width='2.5'/>
  <line x1='460' y1='390' x2='510' y2='240' stroke='#38bdf8' stroke-width='2.5'/>

  <!-- DESCENDING DIAGONALS (compression, orange) -->
  <line x1='110' y1='240' x2='160' y2='390' stroke='#d0622c' stroke-width='2.5'/>
  <line x1='210' y1='240' x2='260' y2='390' stroke='#d0622c' stroke-width='2.5'/>
  <line x1='310' y1='240' x2='360' y2='390' stroke='#d0622c' stroke-width='2.5'/>
  <line x1='410' y1='240' x2='460' y2='390' stroke='#d0622c' stroke-width='2.5'/>

  <!-- Point load arrows (at top nodes) -->
  <line x1='210' y1='180' x2='210' y2='236' stroke='#f6c85f' stroke-width='2' marker-end='url(#arload)'/>
  <text x='210' y='172' font-family='monospace' font-size='10' fill='#f6c85f' text-anchor='middle'>F=20 kN</text>
  <line x1='310' y1='180' x2='310' y2='236' stroke='#f6c85f' stroke-width='2' marker-end='url(#arload)'/>
  <text x='310' y='172' font-family='monospace' font-size='10' fill='#f6c85f' text-anchor='middle'>F=30 kN</text>
  <line x1='410' y1='180' x2='410' y2='236' stroke='#f6c85f' stroke-width='2' marker-end='url(#arload)'/>
  <text x='410' y='172' font-family='monospace' font-size='10' fill='#f6c85f' text-anchor='middle'>F=20 kN</text>

  <!-- Support reactions (pin at B0, roller at B5) -->
  <!-- Pin (triangle, green) -->
  <polygon points='60,390 45,420 75,420' fill='none' stroke='#4ade80' stroke-width='1.8'/>
  <line x1='38' y1='422' x2='82' y2='422' stroke='#4ade80' stroke-width='1.5'/>
  <text x='60' y='437' font-family='monospace' font-size='8' fill='#4ade80' text-anchor='middle'>Pin</text>
  <text x='60' y='448' font-family='monospace' font-size='8' fill='#4ade80' text-anchor='middle'>R_A=35kN</text>
  <!-- Roller (circle, green) -->
  <polygon points='560,390 545,420 575,420' fill='none' stroke='#4ade80' stroke-width='1.8'/>
  <circle cx='560' cy='424' r='4' fill='none' stroke='#4ade80' stroke-width='1.5'/>
  <line x1='538' y1='430' x2='582' y2='430' stroke='#4ade80' stroke-width='1.5'/>
  <text x='560' y='443' font-family='monospace' font-size='8' fill='#4ade80' text-anchor='middle'>Roller</text>
  <text x='560' y='454' font-family='monospace' font-size='8' fill='#4ade80' text-anchor='middle'>R_B=35kN</text>

  <!-- Member force labels -->
  <text x='310' y='408' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>+58.2 kN (T)</text>
  <text x='310' y='226' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>−55.8 kN (C)</text>

  <!-- Node circles -->
  <circle cx='60' cy='390' r='7' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <circle cx='160' cy='390' r='7' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <circle cx='260' cy='390' r='7' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <circle cx='360' cy='390' r='7' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <circle cx='460' cy='390' r='7' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <circle cx='560' cy='390' r='7' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <circle cx='110' cy='240' r='7' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <circle cx='210' cy='240' r='7' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <circle cx='310' cy='240' r='7' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <circle cx='410' cy='240' r='7' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <circle cx='510' cy='240' r='7' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>

  <!-- Legend: tension/compression -->
  <rect x='50' y='100' width='200' height='56' rx='3' fill='#0d1a2e' stroke='#152540' stroke-width='1'/>
  <line x1='60' y1='116' x2='92' y2='116' stroke='#38bdf8' stroke-width='4'/>
  <text x='100' y='120' font-family='monospace' font-size='9' fill='#38bdf8'>Tension member (+)</text>
  <line x1='60' y1='136' x2='92' y2='136' stroke='#d0622c' stroke-width='4'/>
  <text x='100' y='140' font-family='monospace' font-size='9' fill='#d0622c'>Compression member (−)</text>
  <circle cx='74' cy='150' r='5' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <text x='86' y='154' font-family='monospace' font-size='9' fill='#65d6c9'>Gusset node (pinned)</text>

  <!-- Geometry annotation -->
  <line x1='60' y1='408' x2='560' y2='408' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='60' y1='404' x2='60' y2='412' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='560' y1='404' x2='560' y2='412' stroke='#2a4060' stroke-width='0.8'/>
  <text x='310' y='421' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>L = 5.0 m (5 × 1.0 m panels)</text>
  <line x1='42' y1='240' x2='42' y2='390' stroke='#2a4060' stroke-width='0.8'/>
  <text x='38' y='320' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle' transform='rotate(-90,38,320)'>h = 1.5 m</text>

  <!-- Right panel: member force table + FEM info -->
  <rect x='628' y='64' width='310' height='420' rx='4' fill='#0d1a2e'/>
  <text x='783' y='86' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>MEMBER FORCE TABLE</text>

  <!-- Table -->
  <line x1='638' y1='100' x2='930' y2='100' stroke='#152540' stroke-width='0.8'/>
  <text x='678' y='116' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Member</text>
  <text x='790' y='116' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Force [kN]</text>
  <text x='900' y='116' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Type</text>
  <line x1='638' y1='122' x2='930' y2='122' stroke='#152540' stroke-width='0.8'/>

  <text x='678' y='138' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>BC₁–BC₂</text>
  <text x='790' y='138' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>+44.2</text>
  <text x='900' y='138' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>Tension</text>

  <text x='678' y='156' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>BC₂–BC₃</text>
  <text x='790' y='156' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>+58.2</text>
  <text x='900' y='156' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>Tension</text>

  <text x='678' y='174' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>TC₁–TC₂</text>
  <text x='790' y='174' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>−42.4</text>
  <text x='900' y='174' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>Compr.</text>

  <text x='678' y='192' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>TC₂–TC₃</text>
  <text x='790' y='192' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>−55.8</text>
  <text x='900' y='192' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>Compr.</text>

  <text x='678' y='210' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>D_asc</text>
  <text x='790' y='210' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>+23.6</text>
  <text x='900' y='210' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>Tension</text>

  <text x='678' y='228' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>D_desc</text>
  <text x='790' y='228' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>−18.8</text>
  <text x='900' y='228' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>Compr.</text>

  <line x1='638' y1='234' x2='930' y2='234' stroke='#152540' stroke-width='0.8'/>

  <!-- Material + FEM info -->
  <rect x='638' y='248' width='282' height='100' rx='4' fill='#0f2240' stroke='#152540' stroke-width='1'/>
  <text x='779' y='268' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>MATERIAL + SOLVER</text>
  <text x='646' y='284' font-family='monospace' font-size='9' fill='#2a4060'>Material: Steel S355 (E=210 GPa)</text>
  <text x='646' y='300' font-family='monospace' font-size='9' fill='#2a4060'>Section: Hollow square 60×60×4</text>
  <text x='646' y='316' font-family='monospace' font-size='9' fill='#2a4060'>Method: Direct stiffness FEM</text>
  <text x='646' y='332' font-family='monospace' font-size='9' fill='#2a4060'>DOF: 22 · Solver: Python / NumPy</text>
  <text x='646' y='348' font-family='monospace' font-size='9' fill='#2a4060'>Tool: HyperMesh / Siemens NX</text>

  <!-- Max deflection -->
  <rect x='638' y='360' width='282' height='50' rx='4' fill='#0f2240' stroke='#65d6c9' stroke-width='1'/>
  <text x='779' y='378' font-family='monospace' font-size='10' fill='#65d6c9' text-anchor='middle'>Max deflection δ_max</text>
  <text x='779' y='400' font-family='monospace' font-size='15' fill='#65d6c9' text-anchor='middle' font-weight='bold'>3.8 mm   (L/1316)</text>

  <!-- Weight / mass summary -->
  <rect x='638' y='422' width='282' height='52' rx='4' fill='#0f2240' stroke='#f6c85f' stroke-width='1'/>
  <text x='646' y='440' font-family='monospace' font-size='9' fill='#f6c85f'>Total load: 70 kN (3 point loads)</text>
  <text x='646' y='456' font-family='monospace' font-size='9' fill='#f6c85f'>SF_buckling = 3.4  ·  SF_yield = 4.1</text>
  <text x='646' y='470' font-family='monospace' font-size='9' fill='#4ade80'>Structure mass: 87 kg</text>

  <!-- Bottom tag strip -->
  <rect x='24' y='490' width='912' height='34' rx='5' fill='#0d1a2e'/>
  <text x='44' y='512' font-family='monospace' font-size='11' fill='#2a4060'>Warren truss · FEM · Member forces · Tension · Compression · Deflection · S355 · HyperMesh</text>
</svg>
