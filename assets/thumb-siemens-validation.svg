<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='CFD/CHT reducer cross-section for Pulsatorn calibration rig'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
    <linearGradient id='ts' x1='0' y1='0' x2='1' y2='0'>
      <stop offset='0%' stop-color='#38bdf8'/><stop offset='55%' stop-color='#f6c85f'/><stop offset='100%' stop-color='#d0622c'/>
    </linearGradient>
    <marker id='arb' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#38bdf8'/>
    </marker>
    <marker id='aro' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#d0622c'/>
    </marker>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>

  <!-- Title bar -->
  <rect x='24' y='14' width='912' height='36' rx='5' fill='#0d1a2e'/>
  <text x='44' y='38' font-family='monospace' font-size='14' fill='#65d6c9' font-weight='bold'>PULSATORN RIG · CFD/CHT REDUCER · TRITA-ITM-EX 2026:14</text>

  <!-- Duct top wall: inlet flat → reducer taper → outlet flat -->
  <polyline points='62,162 242,162 434,212 900,212' fill='none' stroke='#38bdf8' stroke-width='2.5'/>
  <!-- Duct bottom wall -->
  <polyline points='62,388 242,388 434,338 900,338' fill='none' stroke='#38bdf8' stroke-width='2.5'/>
  <!-- Inlet face -->
  <line x1='62' y1='162' x2='62' y2='388' stroke='#38bdf8' stroke-width='2'/>
  <!-- Outlet face -->
  <line x1='900' y1='212' x2='900' y2='338' stroke='#38bdf8' stroke-width='2'/>

  <!-- Mesh lines vertical (inside duct) -->
  <line x1='122' y1='162' x2='122' y2='388' stroke='#152540' stroke-width='0.9'/>
  <line x1='182' y1='162' x2='182' y2='388' stroke='#152540' stroke-width='0.9'/>
  <line x1='242' y1='162' x2='242' y2='388' stroke='#152540' stroke-width='0.9'/>
  <line x1='290' y1='174' x2='290' y2='376' stroke='#152540' stroke-width='0.9'/>
  <line x1='338' y1='187' x2='338' y2='363' stroke='#152540' stroke-width='0.9'/>
  <line x1='386' y1='199' x2='386' y2='351' stroke='#152540' stroke-width='0.9'/>
  <line x1='434' y1='212' x2='434' y2='338' stroke='#152540' stroke-width='0.9'/>
  <line x1='514' y1='212' x2='514' y2='338' stroke='#152540' stroke-width='0.9'/>
  <line x1='594' y1='212' x2='594' y2='338' stroke='#152540' stroke-width='0.9'/>
  <line x1='674' y1='212' x2='674' y2='338' stroke='#152540' stroke-width='0.9'/>
  <line x1='754' y1='212' x2='754' y2='338' stroke='#152540' stroke-width='0.9'/>
  <line x1='834' y1='212' x2='834' y2='338' stroke='#152540' stroke-width='0.9'/>

  <!-- Mesh lines horizontal (inside duct) -->
  <line x1='62' y1='222' x2='242' y2='222' stroke='#152540' stroke-width='0.9'/>
  <line x1='62' y1='275' x2='900' y2='275' stroke='#152540' stroke-width='0.9' stroke-dasharray='5,4'/>
  <line x1='62' y1='328' x2='242' y2='328' stroke='#152540' stroke-width='0.9'/>
  <line x1='434' y1='245' x2='900' y2='245' stroke='#152540' stroke-width='0.9'/>
  <line x1='434' y1='305' x2='900' y2='305' stroke='#152540' stroke-width='0.9'/>

  <!-- Temperature contours: wall-hot (orange near walls, amber inner) -->
  <polyline points='64,177 240,177 430,226 898,226' fill='none' stroke='#d0622c' stroke-width='1.3' stroke-dasharray='5,3' opacity='0.85'/>
  <polyline points='66,196 238,196 426,242 896,242' fill='none' stroke='#f6c85f' stroke-width='1' stroke-dasharray='5,3' opacity='0.65'/>
  <polyline points='64,373 240,373 430,324 898,324' fill='none' stroke='#d0622c' stroke-width='1.3' stroke-dasharray='5,3' opacity='0.85'/>
  <polyline points='66,354 238,354 426,308 896,308' fill='none' stroke='#f6c85f' stroke-width='1' stroke-dasharray='5,3' opacity='0.65'/>

  <!-- Flow arrows -->
  <line x1='76' y1='275' x2='114' y2='275' stroke='#38bdf8' stroke-width='1.5' marker-end='url(#arb)'/>
  <line x1='76' y1='233' x2='114' y2='233' stroke='#38bdf8' stroke-width='1.2' marker-end='url(#arb)' opacity='0.6'/>
  <line x1='76' y1='317' x2='114' y2='317' stroke='#38bdf8' stroke-width='1.2' marker-end='url(#arb)' opacity='0.6'/>
  <line x1='350' y1='275' x2='395' y2='275' stroke='#38bdf8' stroke-width='1.5' marker-end='url(#arb)'/>
  <line x1='570' y1='275' x2='624' y2='275' stroke='#38bdf8' stroke-width='2' marker-end='url(#arb)'/>
  <line x1='730' y1='275' x2='784' y2='275' stroke='#38bdf8' stroke-width='2' marker-end='url(#arb)'/>

  <!-- External heat flux arrows (CHT wall heating) -->
  <line x1='142' y1='128' x2='142' y2='158' stroke='#d0622c' stroke-width='1.5' marker-end='url(#aro)'/>
  <line x1='192' y1='128' x2='192' y2='158' stroke='#d0622c' stroke-width='1.5' marker-end='url(#aro)'/>
  <line x1='142' y1='422' x2='142' y2='392' stroke='#d0622c' stroke-width='1.5' marker-end='url(#aro)'/>
  <line x1='192' y1='422' x2='192' y2='392' stroke='#d0622c' stroke-width='1.5' marker-end='url(#aro)'/>
  <text x='104' y='120' font-family='monospace' font-size='11' fill='#d0622c'>q_wall</text>

  <!-- Annotation: inlet conditions -->
  <rect x='24' y='60' width='118' height='46' rx='4' fill='#0d1a2e' stroke='#2563a8' stroke-width='1'/>
  <text x='35' y='79' font-family='monospace' font-size='12' fill='#f6c85f'>T = 673 K</text>
  <text x='35' y='96' font-family='monospace' font-size='11' fill='#65d6c9'>p = 100 kPa</text>

  <!-- Annotation: Biot + turbulence model -->
  <rect x='728' y='352' width='160' height='46' rx='4' fill='#0d1a2e' stroke='#2563a8' stroke-width='1'/>
  <text x='740' y='371' font-family='monospace' font-size='12' fill='#65d6c9'>Bi = 0.003–0.004</text>
  <text x='740' y='387' font-family='monospace' font-size='10' fill='#2a4060'>k-omega SST  ·  CHT</text>

  <!-- Annotation: Mach regime -->
  <rect x='596' y='60' width='158' height='46' rx='4' fill='#0d1a2e' stroke='#8f7fff' stroke-width='1'/>
  <text x='608' y='79' font-family='monospace' font-size='11' fill='#8f7fff'>Ma 0.990 legacy</text>
  <text x='608' y='95' font-family='monospace' font-size='10' fill='#2a4060'>near-choked at throat</text>

  <!-- Section labels -->
  <text x='148' y='428' font-family='monospace' font-size='11' fill='#2a4060' text-anchor='middle'>INLET</text>
  <text x='338' y='454' font-family='monospace' font-size='11' fill='#2a4060' text-anchor='middle'>REDUCER</text>
  <text x='664' y='360' font-family='monospace' font-size='11' fill='#2a4060' text-anchor='middle'>OUTLET</text>

  <!-- Temperature colour scale -->
  <rect x='818' y='60' width='118' height='14' rx='3' fill='url(#ts)'/>
  <text x='818' y='88' font-family='monospace' font-size='10' fill='#38bdf8'>T low</text>
  <text x='936' y='88' font-family='monospace' font-size='10' fill='#d0622c' text-anchor='end'>T high</text>

  <!-- Bottom tag strip -->
  <rect x='24' y='490' width='912' height='34' rx='5' fill='#0d1a2e'/>
  <text x='44' y='512' font-family='monospace' font-size='11' fill='#2a4060'>ANSYS Fluent · k-omega SST · Conjugate Heat Transfer · Mesh Independence · Biot Number Analysis</text>
</svg>
