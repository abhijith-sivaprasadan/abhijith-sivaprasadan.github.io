<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 480 270' role='img' aria-label='District Heating Dispatch Optimisation Python PuLP MILP five scenario model'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
  </defs>
  <rect width='480' height='270' fill='url(#bg)'/>

  <!-- Bar chart: 5 scenarios -->
  <!-- Axis -->
  <line x1='50' y1='30' x2='50' y2='200' stroke='#2a4060' stroke-width='1.5'/>
  <line x1='50' y1='200' x2='450' y2='200' stroke='#2a4060' stroke-width='1.5'/>

  <!-- Scenario bars (stacked concept) -->
  <!-- S1: Base -->
  <rect x='65' y='110' width='52' height='90' rx='2' fill='#38bdf8' opacity='0.85'/>
  <text x='91' y='214' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Base</text>

  <!-- S2: Future demand -->
  <rect x='140' y='90' width='52' height='110' rx='2' fill='#65d6c9' opacity='0.85'/>
  <text x='166' y='214' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Demand</text>

  <!-- S3: Storage -->
  <rect x='215' y='70' width='52' height='130' rx='2' fill='#8f7fff' opacity='0.85'/>
  <text x='241' y='214' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Storage</text>

  <!-- S4: Cost min -->
  <rect x='290' y='50' width='52' height='150' rx='2' fill='#f6c85f' opacity='0.85'/>
  <text x='316' y='214' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Cost</text>

  <!-- S5: Emissions min -->
  <rect x='365' y='80' width='52' height='120' rx='2' fill='#4ade80' opacity='0.85'/>
  <text x='391' y='214' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Emissions</text>

  <!-- Y-axis label -->
  <text x='18' y='130' font-family='monospace' font-size='9' fill='#2a4060' transform='rotate(-90,18,130)'>Heat dispatch</text>

  <!-- Scenario label -->
  <text x='50' y='22' font-family='monospace' font-size='11' fill='#f6c85f' font-weight='bold'>5-scenario MILP dispatch</text>

  <!-- Python/PuLP badge -->
  <rect x='340' y='220' width='120' height='24' rx='4' fill='#1a2840'/>
  <text x='400' y='236' font-family='monospace' font-size='10' fill='#38bdf8' text-anchor='middle'>Python · PuLP</text>

  <!-- Title -->
  <text x='24' y='254' font-family='monospace' font-size='12' fill='#f6c85f' font-weight='bold'>District Heating Dispatch Optimisation</text>
  <text x='24' y='268' font-family='monospace' font-size='10' fill='#2a4060'>CHP · heat pumps · geothermal · storage</text>
</svg>
