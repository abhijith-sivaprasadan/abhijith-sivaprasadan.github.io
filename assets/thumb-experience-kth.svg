<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='KTH pyrolysis reactor plastic waste decomposition oil gas char product yield'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
    <linearGradient id='reactgrad' x1='0' y1='0' x2='1' y2='0'>
      <stop offset='0%' stop-color='#38bdf8' stop-opacity='0.3'/>
      <stop offset='40%' stop-color='#f6c85f' stop-opacity='0.4'/>
      <stop offset='80%' stop-color='#d0622c' stop-opacity='0.5'/>
      <stop offset='100%' stop-color='#d0622c' stop-opacity='0.4'/>
    </linearGradient>
    <marker id='arr' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#f6c85f'/>
    </marker>
    <marker id='arb' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#38bdf8'/>
    </marker>
    <marker id='aro' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#d0622c'/>
    </marker>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>

  <!-- Title bar -->
  <rect x='24' y='14' width='912' height='36' rx='5' fill='#0d1a2e'/>
  <text x='44' y='38' font-family='monospace' font-size='14' fill='#8f7fff' font-weight='bold'>KTH PYROLYSIS · PLASTIC WASTE DECOMPOSITION · REACTOR CONCEPT + COST ANALYSIS</text>

  <!-- Left panel: reactor flow diagram -->
  <rect x='30' y='64' width='520' height='420' rx='4' fill='#0d1a2e'/>
  <text x='290' y='86' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>PYROLYSIS REACTOR — PROCESS SCHEMATIC</text>

  <!-- Feed hopper (polymer pellets) -->
  <polygon points='52,115 98,115 90,155 60,155' fill='#0f2240' stroke='#2a4060' stroke-width='1.5'/>
  <text x='75' y='108' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>Feed</text>
  <!-- Pellet dots -->
  <circle cx='65' cy='130' r='3' fill='#38bdf8' opacity='0.6'/>
  <circle cx='72' cy='138' r='3' fill='#38bdf8' opacity='0.6'/>
  <circle cx='80' cy='130' r='3' fill='#38bdf8' opacity='0.6'/>
  <circle cx='87' cy='138' r='3' fill='#38bdf8' opacity='0.6'/>
  <text x='75' y='168' font-family='monospace' font-size='8' fill='#38bdf8' text-anchor='middle'>PP/PE/PS</text>
  <!-- Feed screw arrow -->
  <line x1='90' y1='140' x2='118' y2='165' stroke='#38bdf8' stroke-width='1.5' marker-end='url(#arb)'/>

  <!-- Reactor tube (horizontal, heated) -->
  <rect x='118' y='155' width='300' height='60' rx='8' fill='url(#reactgrad)' stroke='#d0622c' stroke-width='2'/>
  <text x='268' y='178' font-family='monospace' font-size='10' fill='#d0622c' text-anchor='middle' font-weight='bold'>PYROLYSIS REACTOR</text>
  <text x='268' y='196' font-family='monospace' font-size='9' fill='#f6c85f' text-anchor='middle'>T = 450–550°C · τ = 30–90 min</text>
  <text x='268' y='210' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>inert atmosphere (N₂) · screw-type</text>

  <!-- Heating elements (below reactor) -->
  <line x1='148' y1='215' x2='148' y2='235' stroke='#d0622c' stroke-width='1' stroke-dasharray='3,2'/>
  <line x1='198' y1='215' x2='198' y2='235' stroke='#d0622c' stroke-width='1' stroke-dasharray='3,2'/>
  <line x1='248' y1='215' x2='248' y2='235' stroke='#d0622c' stroke-width='1' stroke-dasharray='3,2'/>
  <line x1='298' y1='215' x2='298' y2='235' stroke='#d0622c' stroke-width='1' stroke-dasharray='3,2'/>
  <line x1='348' y1='215' x2='348' y2='235' stroke='#d0622c' stroke-width='1' stroke-dasharray='3,2'/>
  <text x='248' y='250' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>electrical heating zone</text>

  <!-- T profile curve (below reactor) -->
  <text x='75' y='270' font-family='monospace' font-size='9' fill='#2a4060'>T profile →</text>
  <line x1='118' y1='290' x2='418' y2='290' stroke='#152540' stroke-width='1'/>
  <polyline points='118,312 168,308 218,296 268,282 318,278 368,280 418,283'
            fill='none' stroke='#d0622c' stroke-width='2'/>
  <text x='118' y='305' font-family='monospace' font-size='8' fill='#38bdf8'>200°C</text>
  <text x='390' y='275' font-family='monospace' font-size='8' fill='#d0622c'>550°C</text>

  <!-- Products leaving reactor (top and right) -->
  <!-- Vapour/gas line (up) -->
  <line x1='350' y1='155' x2='350' y2='118' stroke='#8f7fff' stroke-width='2' marker-end='url(#arr)'/>
  <text x='356' y='114' font-family='monospace' font-size='8' fill='#8f7fff'>vapour + gas</text>

  <!-- Condenser -->
  <rect x='310' y='68' width='100' height='46' rx='4' fill='#0f2240' stroke='#8f7fff' stroke-width='1.5'/>
  <text x='360' y='88' font-family='monospace' font-size='9' fill='#8f7fff' text-anchor='middle' font-weight='bold'>CONDENSER</text>
  <text x='360' y='104' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>water-cooled</text>

  <!-- Oil product (liquid, drips down from condenser) -->
  <line x1='326' y1='114' x2='310' y2='130' stroke='#f6c85f' stroke-width='1.5' stroke-dasharray='3,2'/>
  <rect x='264' y='130' width='80' height='30' rx='3' fill='#0f2240' stroke='#f6c85f' stroke-width='1.2'/>
  <text x='304' y='149' font-family='monospace' font-size='9' fill='#f6c85f' text-anchor='middle'>Oil/wax 38%</text>

  <!-- Non-condensable gas (continues up) -->
  <line x1='394' y1='86' x2='416' y2='86' stroke='#65d6c9' stroke-width='1.5' marker-end='url(#arb)'/>
  <rect x='416' y='68' width='80' height='36' rx='3' fill='#0f2240' stroke='#65d6c9' stroke-width='1.2'/>
  <text x='456' y='87' font-family='monospace' font-size='9' fill='#65d6c9' text-anchor='middle' font-weight='bold'>NCG</text>
  <text x='456' y='99' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>gas 28%</text>

  <!-- Char output (end of reactor, right side) -->
  <line x1='418' y1='185' x2='456' y2='185' stroke='#2a4060' stroke-width='2' marker-end='url(#arr)'/>
  <rect x='456' y='160' width='80' height='50' rx='4' fill='#0f2240' stroke='#2a4060' stroke-width='1.5'/>
  <text x='496' y='182' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>CHAR</text>
  <text x='496' y='198' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>solid 34%</text>

  <!-- Mass balance -->
  <rect x='50' y='330' width='460' height='120' rx='4' fill='#0f2240' stroke='#152540' stroke-width='1'/>
  <text x='280' y='350' font-family='monospace' font-size='10' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>FEEDSTOCK MASS BALANCE (100 kg PP/PE, 500°C)</text>
  <!-- Product bars -->
  <!-- Oil 38% -->
  <rect x='70' y='362' width='76' height='22' rx='2' fill='#f6c85f' opacity='0.7'/>
  <text x='108' y='377' font-family='monospace' font-size='9' fill='#0a1020' text-anchor='middle' font-weight='bold'>Oil 38 kg</text>
  <!-- Gas 28% -->
  <rect x='158' y='362' width='56' height='22' rx='2' fill='#65d6c9' opacity='0.7'/>
  <text x='186' y='377' font-family='monospace' font-size='9' fill='#0a1020' text-anchor='middle' font-weight='bold'>Gas 28</text>
  <!-- Char 34% -->
  <rect x='226' y='362' width='68' height='22' rx='2' fill='#2a4060' opacity='0.9'/>
  <text x='260' y='377' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>Char 34</text>
  <!-- Energy content label -->
  <text x='70' y='404' font-family='monospace' font-size='9' fill='#2a4060'>Oil HHV ≈ 42 MJ/kg  ·  Gas HHV ≈ 38 MJ/kg  ·  Char HHV ≈ 28 MJ/kg</text>
  <text x='70' y='420' font-family='monospace' font-size='9' fill='#4ade80'>Energy yield: 89% of feedstock HHV recovered as fuel products</text>
  <text x='70' y='440' font-family='monospace' font-size='9' fill='#2a4060'>Process energy input: 0.8 MJ/kg_feed · N₂ purge: 2 L/min · Heating rate: 10 K/min</text>

  <!-- Right panel: cost analysis -->
  <rect x='566' y='64' width='370' height='420' rx='4' fill='#0d1a2e'/>
  <text x='751' y='86' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>COST DRIVER ANALYSIS</text>

  <!-- Cost breakdown pie / bar chart -->
  <text x='751' y='112' font-family='monospace' font-size='10' fill='#2a4060' text-anchor='middle'>Estimated production cost [€/t_output]</text>

  <!-- Horizontal bar chart: feedstock, energy, CAPEX, OpEx, O&M -->
  <line x1='590' y1='126' x2='590' y2='290' stroke='#2a4060' stroke-width='1'/>
  <line x1='590' y1='290' x2='920' y2='290' stroke='#2a4060' stroke-width='1'/>
  <!-- Scale: max 200 €/t over 330px → 1.65 px/(€/t) -->

  <!-- Feedstock (38% of cost, ~76 €/t) → 125px -->
  <rect x='590' y='134' width='125' height='24' rx='2' fill='#38bdf8' opacity='0.7'/>
  <text x='598' y='150' font-family='monospace' font-size='9' fill='#0a1020' font-weight='bold'>Feedstock 76 €/t</text>
  <text x='720' y='150' font-family='monospace' font-size='9' fill='#38bdf8'>38%</text>

  <!-- Energy (18%, ~36 €/t) → 59px -->
  <rect x='590' y='166' width='59' height='24' rx='2' fill='#d0622c' opacity='0.7'/>
  <text x='598' y='182' font-family='monospace' font-size='9' fill='#0a1020' font-weight='bold'>Energy 36 €/t</text>
  <text x='654' y='182' font-family='monospace' font-size='9' fill='#d0622c'>18%</text>

  <!-- CAPEX (25%, ~50 €/t) → 83px -->
  <rect x='590' y='198' width='83' height='24' rx='2' fill='#8f7fff' opacity='0.7'/>
  <text x='598' y='214' font-family='monospace' font-size='9' fill='#0a1020' font-weight='bold'>CAPEX 50 €/t</text>
  <text x='678' y='214' font-family='monospace' font-size='9' fill='#8f7fff'>25%</text>

  <!-- Labour/O&M (12%, ~24 €/t) → 40px -->
  <rect x='590' y='230' width='40' height='24' rx='2' fill='#f6c85f' opacity='0.7'/>
  <text x='598' y='246' font-family='monospace' font-size='9' fill='#0a1020' font-weight='bold'>Labour 24 €/t</text>
  <text x='634' y='246' font-family='monospace' font-size='9' fill='#f6c85f'>12%</text>

  <!-- Other (7%, ~14 €/t) → 23px -->
  <rect x='590' y='262' width='23' height='24' rx='2' fill='#2a4060' opacity='0.9'/>
  <text x='620' y='278' font-family='monospace' font-size='9' fill='#c8d8ea'>Other 14 €/t  7%</text>

  <!-- Total line -->
  <line x1='590' y1='296' x2='796' y2='296' stroke='#65d6c9' stroke-width='1.5'/>
  <text x='598' y='312' font-family='monospace' font-size='10' fill='#65d6c9'>Total ≈ 200 €/t_oil</text>
  <text x='598' y='326' font-family='monospace' font-size='9' fill='#4ade80'>vs fossil naphtha: 650–800 €/t → break-even possible</text>

  <!-- Scenarios comparison table -->
  <rect x='574' y='346' width='354' height='126' rx='4' fill='#0f2240' stroke='#152540' stroke-width='1'/>
  <text x='751' y='366' font-family='monospace' font-size='10' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>REACTOR CONCEPT COMPARISON</text>
  <line x1='576' y1='372' x2='926' y2='372' stroke='#152540' stroke-width='0.8'/>
  <text x='638' y='386' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Reactor type</text>
  <text x='770' y='386' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Oil yield</text>
  <text x='880' y='386' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>CAPEX index</text>
  <line x1='576' y1='392' x2='926' y2='392' stroke='#152540' stroke-width='0.8'/>
  <text x='638' y='408' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>Fixed bed</text>
  <text x='770' y='408' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>38%</text>
  <text x='880' y='408' font-family='monospace' font-size='9' fill='#4ade80' text-anchor='middle'>1.0 (ref)</text>
  <text x='638' y='426' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>Rotary kiln</text>
  <text x='770' y='426' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>42%</text>
  <text x='880' y='426' font-family='monospace' font-size='9' fill='#f6c85f' text-anchor='middle'>1.8</text>
  <text x='638' y='444' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>Fluidised bed</text>
  <text x='770' y='444' font-family='monospace' font-size='9' fill='#4ade80' text-anchor='middle'>55%</text>
  <text x='880' y='444' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>2.6</text>
  <text x='638' y='462' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>Microwave</text>
  <text x='770' y='462' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>44%</text>
  <text x='880' y='462' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>3.2</text>

  <!-- Bottom tag strip -->
  <rect x='24' y='490' width='912' height='34' rx='5' fill='#0d1a2e'/>
  <text x='44' y='512' font-family='monospace' font-size='11' fill='#2a4060'>Pyrolysis · Plastic waste · Oil yield · Char · Gas · Reactor · Techno-economics · KTH</text>
</svg>
