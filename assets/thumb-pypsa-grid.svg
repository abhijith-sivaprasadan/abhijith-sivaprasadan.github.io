<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='PyPSA Netherlands power network grid congestion and BESS model'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
    <marker id='arr' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#38bdf8'/>
    </marker>
    <marker id='aro' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#f6c85f'/>
    </marker>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>

  <!-- Title bar -->
  <rect x='24' y='14' width='912' height='36' rx='5' fill='#0d1a2e'/>
  <text x='44' y='38' font-family='monospace' font-size='14' fill='#65d6c9' font-weight='bold'>PyPSA-NL · GRID CONGESTION MODEL · BESS OPTIMISATION</text>

  <!-- Background grid -->
  <line x1='40' y1='100' x2='670' y2='100' stroke='#0f2240' stroke-width='0.6'/>
  <line x1='40' y1='200' x2='670' y2='200' stroke='#0f2240' stroke-width='0.6'/>
  <line x1='40' y1='300' x2='670' y2='300' stroke='#0f2240' stroke-width='0.6'/>
  <line x1='40' y1='400' x2='670' y2='400' stroke='#0f2240' stroke-width='0.6'/>
  <line x1='130' y1='70' x2='130' y2='480' stroke='#0f2240' stroke-width='0.6'/>
  <line x1='270' y1='70' x2='270' y2='480' stroke='#0f2240' stroke-width='0.6'/>
  <line x1='410' y1='70' x2='410' y2='480' stroke='#0f2240' stroke-width='0.6'/>
  <line x1='550' y1='70' x2='550' y2='480' stroke='#0f2240' stroke-width='0.6'/>

  <!-- Transmission lines -->
  <!-- A-B: congested (amber) -->
  <line x1='152' y1='190' x2='295' y2='155' stroke='#f6c85f' stroke-width='4'/>
  <!-- B-C: normal -->
  <line x1='323' y1='155' x2='480' y2='130' stroke='#38bdf8' stroke-width='2.8'/>
  <!-- C-D: normal -->
  <line x1='507' y1='140' x2='600' y2='225' stroke='#38bdf8' stroke-width='2.8'/>
  <!-- D-E: congested -->
  <line x1='587' y1='248' x2='455' y2='328' stroke='#f6c85f' stroke-width='4'/>
  <!-- E-F: normal -->
  <line x1='432' y1='338' x2='283' y2='375' stroke='#38bdf8' stroke-width='2.8'/>
  <!-- F-A: normal -->
  <line x1='264' y1='365' x2='150' y2='210' stroke='#38bdf8' stroke-width='2.8'/>
  <!-- B-E: interconnector dashed -->
  <line x1='309' y1='168' x2='443' y2='328' stroke='#2563a8' stroke-width='2' stroke-dasharray='6,4'/>
  <!-- Offshore cable G-C -->
  <line x1='493' y1='108' x2='493' y2='120' stroke='#65d6c9' stroke-width='2'/>

  <!-- Flow arrows on key lines -->
  <line x1='214' y1='176' x2='252' y2='164' stroke='#f6c85f' stroke-width='1.8' marker-end='url(#aro)'/>
  <line x1='388' y1='140' x2='426' y2='133' stroke='#38bdf8' stroke-width='1.5' marker-end='url(#arr)'/>
  <line x1='541' y1='188' x2='563' y2='208' stroke='#38bdf8' stroke-width='1.5' marker-end='url(#arr)'/>

  <!-- Node A: wind gen NW -->
  <circle cx='140' cy='198' r='20' fill='#0a1624' stroke='#65d6c9' stroke-width='2.2'/>
  <line x1='140' y1='180' x2='140' y2='216' stroke='#65d6c9' stroke-width='1.5'/>
  <line x1='125' y1='188' x2='155' y2='188' stroke='#65d6c9' stroke-width='1.3'/>
  <polyline points='125,182 140,180 155,182' fill='none' stroke='#65d6c9' stroke-width='1.3'/>
  <text x='140' y='228' font-family='monospace' font-size='10' fill='#65d6c9' text-anchor='middle'>Wind N</text>

  <!-- Node B: central bus -->
  <circle cx='309' cy='155' r='18' fill='#0a1624' stroke='#38bdf8' stroke-width='2.2'/>
  <text x='309' y='160' font-family='monospace' font-size='11' fill='#38bdf8' text-anchor='middle' font-weight='bold'>HV1</text>
  <text x='309' y='183' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Central</text>

  <!-- Node C: east -->
  <circle cx='493' cy='128' r='18' fill='#0a1624' stroke='#38bdf8' stroke-width='2.2'/>
  <text x='493' y='133' font-family='monospace' font-size='11' fill='#38bdf8' text-anchor='middle' font-weight='bold'>HV2</text>
  <text x='493' y='156' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>East</text>

  <!-- Node G: offshore wind -->
  <circle cx='493' cy='82' r='16' fill='#0a1624' stroke='#65d6c9' stroke-width='2'/>
  <line x1='493' y1='68' x2='493' y2='82' stroke='#65d6c9' stroke-width='1.5'/>
  <line x1='480' y1='74' x2='506' y2='74' stroke='#65d6c9' stroke-width='1.2'/>
  <text x='530' y='84' font-family='monospace' font-size='9' fill='#65d6c9'>OWF</text>

  <!-- Node D: load -->
  <circle cx='600' cy='235' r='18' fill='#0a1624' stroke='#8f7fff' stroke-width='2.2'/>
  <rect x='591' y='226' width='9' height='11' fill='none' stroke='#8f7fff' stroke-width='1.3'/>
  <line x1='595' y1='222' x2='595' y2='226' stroke='#8f7fff' stroke-width='1.3'/>
  <text x='600' y='264' font-family='monospace' font-size='9' fill='#8f7fff' text-anchor='middle'>Load SE</text>

  <!-- Node E: BESS -->
  <circle cx='443' cy='336' r='20' fill='#0a1624' stroke='#4ade80' stroke-width='2.2'/>
  <rect x='430' y='328' width='26' height='15' rx='2' fill='none' stroke='#4ade80' stroke-width='1.5'/>
  <line x1='430' y1='332' x2='430' y2='340' stroke='#4ade80' stroke-width='2.5'/>
  <text x='443' y='366' font-family='monospace' font-size='9' fill='#4ade80' text-anchor='middle'>BESS</text>

  <!-- Node F: solar SW -->
  <circle cx='270' cy='373' r='18' fill='#0a1624' stroke='#f6c85f' stroke-width='2.2'/>
  <circle cx='270' cy='373' r='7' fill='none' stroke='#f6c85f' stroke-width='1.5'/>
  <line x1='270' y1='362' x2='270' y2='356' stroke='#f6c85f' stroke-width='1.3'/>
  <line x1='270' y1='384' x2='270' y2='390' stroke='#f6c85f' stroke-width='1.3'/>
  <line x1='259' y1='373' x2='253' y2='373' stroke='#f6c85f' stroke-width='1.3'/>
  <line x1='281' y1='373' x2='287' y2='373' stroke='#f6c85f' stroke-width='1.3'/>
  <text x='270' y='402' font-family='monospace' font-size='9' fill='#f6c85f' text-anchor='middle'>Solar SW</text>

  <!-- Generation mix mini bar chart (right side) -->
  <rect x='690' y='78' width='246' height='386' rx='6' fill='#0d1a2e' stroke='#152540' stroke-width='1'/>
  <text x='813' y='100' font-family='monospace' font-size='12' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>DISPATCH MIX</text>
  <rect x='706' y='114' width='112' height='22' rx='2' fill='#65d6c9' opacity='0.8'/>
  <text x='826' y='130' font-family='monospace' font-size='10' fill='#65d6c9'>Wind   47%</text>
  <rect x='706' y='148' width='52' height='22' rx='2' fill='#f6c85f' opacity='0.8'/>
  <text x='826' y='164' font-family='monospace' font-size='10' fill='#f6c85f'>Solar  22%</text>
  <rect x='706' y='182' width='33' height='22' rx='2' fill='#4ade80' opacity='0.8'/>
  <text x='826' y='198' font-family='monospace' font-size='10' fill='#4ade80'>BESS   14%</text>
  <rect x='706' y='216' width='28' height='22' rx='2' fill='#d0622c' opacity='0.8'/>
  <text x='826' y='232' font-family='monospace' font-size='10' fill='#d0622c'>Gas    12%</text>
  <rect x='706' y='250' width='12' height='22' rx='2' fill='#8f7fff' opacity='0.8'/>
  <text x='826' y='266' font-family='monospace' font-size='10' fill='#8f7fff'>Import  5%</text>

  <!-- Congestion legend -->
  <line x1='706' y1='304' x2='740' y2='304' stroke='#f6c85f' stroke-width='3.5'/>
  <text x='748' y='309' font-family='monospace' font-size='10' fill='#f6c85f'>Congested</text>
  <line x1='706' y1='326' x2='740' y2='326' stroke='#38bdf8' stroke-width='2.8'/>
  <text x='748' y='331' font-family='monospace' font-size='10' fill='#38bdf8'>Normal flow</text>
  <line x1='706' y1='348' x2='740' y2='348' stroke='#2563a8' stroke-width='2' stroke-dasharray='5,3'/>
  <text x='748' y='353' font-family='monospace' font-size='10' fill='#2563a8'>Interconnect</text>

  <!-- Bottom tag strip -->
  <rect x='24' y='490' width='912' height='34' rx='5' fill='#0d1a2e'/>
  <text x='44' y='512' font-family='monospace' font-size='11' fill='#2a4060'>PyPSA · Renewable integration · N-1 contingency · BESS dispatch · Pyomo LP optimisation</text>
</svg>
