<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='Seasonal heating demand forecast with model prediction vs actual'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
    <linearGradient id='band' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0%' stop-color='#38bdf8' stop-opacity='0.15'/>
      <stop offset='100%' stop-color='#38bdf8' stop-opacity='0.03'/>
    </linearGradient>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>

  <!-- Title bar -->
  <rect x='24' y='14' width='912' height='36' rx='5' fill='#0d1a2e'/>
  <text x='44' y='38' font-family='monospace' font-size='14' fill='#65d6c9' font-weight='bold'>DISTRICT HEATING DEMAND FORECAST · SEASONAL MODEL · PYTHON / SKLEARN</text>

  <!-- Chart area -->
  <rect x='60' y='64' width='880' height='380' rx='4' fill='#0d1a2e'/>

  <!-- Grid lines horizontal -->
  <line x1='100' y1='110' x2='920' y2='110' stroke='#152540' stroke-width='0.8'/>
  <line x1='100' y1='180' x2='920' y2='180' stroke='#152540' stroke-width='0.8'/>
  <line x1='100' y1='250' x2='920' y2='250' stroke='#152540' stroke-width='0.8'/>
  <line x1='100' y1='320' x2='920' y2='320' stroke='#152540' stroke-width='0.8'/>
  <line x1='100' y1='390' x2='920' y2='390' stroke='#152540' stroke-width='0.8'/>

  <!-- Axes -->
  <line x1='100' y1='68' x2='100' y2='420' stroke='#2a4060' stroke-width='1.2'/>
  <line x1='100' y1='420' x2='920' y2='420' stroke='#2a4060' stroke-width='1.2'/>

  <!-- Y-axis labels [MW] -->
  <text x='94' y='114' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>80</text>
  <text x='94' y='184' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>60</text>
  <text x='94' y='254' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>40</text>
  <text x='94' y='324' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>20</text>
  <text x='94' y='394' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>0</text>
  <text x='72' y='255' font-family='monospace' font-size='9' fill='#2a4060' transform='rotate(-90,72,255)' text-anchor='middle'>Demand [MW]</text>

  <!-- X-axis: months Jan→Dec→Jan -->
  <text x='100' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Jan</text>
  <text x='165' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Feb</text>
  <text x='230' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Mar</text>
  <text x='295' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Apr</text>
  <text x='360' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>May</text>
  <text x='425' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Jun</text>
  <text x='490' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Jul</text>
  <text x='555' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Aug</text>
  <text x='620' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Sep</text>
  <text x='685' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Oct</text>
  <text x='750' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Nov</text>
  <text x='815' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Dec</text>
  <text x='880' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Jan+</text>

  <!-- Confidence band (upper and lower bound filled area) -->
  <!-- Upper bound follows actual curve + ~25 -->
  <polygon points='100,118 165,105 230,148 295,248 360,360 425,400 490,405 555,402 620,358 685,248 750,145 815,102 880,118 880,135 815,120 750,162 685,268 620,378 555,422 490,425 425,420 360,380 295,268 230,168 165,125 100,138' fill='url(#band)'/>

  <!-- Actual heating demand (seasonal pattern: peaks in winter, troughs in summer) -->
  <polyline points='100,128 165,115 230,158 295,258 360,370 425,410 490,415 555,412 620,368 685,258 750,155 815,112 880,128' fill='none' stroke='#d0622c' stroke-width='2' stroke-dasharray='4,2'/>

  <!-- Model prediction line -->
  <polyline points='100,132 165,118 230,162 295,255 360,365 425,407 490,412 555,409 620,364 685,255 750,152 815,110 880,132' fill='none' stroke='#38bdf8' stroke-width='2.5'/>

  <!-- Temperature driver (secondary axis) - dashed grey -->
  <polyline points='100,260 165,235 230,280 295,335 360,390 425,408 490,410 555,408 620,388 685,335 750,280 815,235 880,260' fill='none' stroke='#2a4060' stroke-width='1.2' stroke-dasharray='6,4' opacity='0.7'/>

  <!-- Legend -->
  <rect x='638' y='74' width='270' height='80' rx='4' fill='#0d1a2e' stroke='#152540' stroke-width='1'/>
  <line x1='650' y1='94' x2='680' y2='94' stroke='#38bdf8' stroke-width='2.5'/>
  <text x='688' y='98' font-family='monospace' font-size='10' fill='#38bdf8'>Model prediction</text>
  <line x1='650' y1='114' x2='680' y2='114' stroke='#d0622c' stroke-width='2' stroke-dasharray='4,2'/>
  <text x='688' y='118' font-family='monospace' font-size='10' fill='#d0622c'>Actual demand</text>
  <line x1='650' y1='134' x2='680' y2='134' stroke='#2a4060' stroke-width='1.2' stroke-dasharray='6,4'/>
  <text x='688' y='138' font-family='monospace' font-size='10' fill='#2a4060'>Outdoor temp proxy</text>

  <!-- Model metrics box -->
  <rect x='638' y='164' width='270' height='80' rx='4' fill='#0d1a2e' stroke='#152540' stroke-width='1'/>
  <text x='773' y='184' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>Model metrics</text>
  <text x='650' y='204' font-family='monospace' font-size='11' fill='#65d6c9'>R² = 0.91</text>
  <text x='760' y='204' font-family='monospace' font-size='11' fill='#65d6c9'>RMSE = 3.2 MW</text>
  <text x='650' y='224' font-family='monospace' font-size='10' fill='#2a4060'>HDD regression + lag features</text>

  <!-- Winter peak annotation -->
  <circle cx='815' cy='112' r='5' fill='#d0622c'/>
  <text x='840' y='108' font-family='monospace' font-size='9' fill='#d0622c'>Winter peak</text>

  <!-- Summer trough annotation -->
  <circle cx='490' cy='415' r='5' fill='#38bdf8'/>
  <text x='500' y='408' font-family='monospace' font-size='9' fill='#38bdf8'>Summer min</text>

  <!-- Bottom tag strip -->
  <rect x='24' y='490' width='912' height='34' rx='5' fill='#0d1a2e'/>
  <text x='44' y='512' font-family='monospace' font-size='11' fill='#2a4060'>Python · Scikit-learn · HDD regression · Seasonal decomposition · Cross-validation · Forecast error</text>
</svg>
