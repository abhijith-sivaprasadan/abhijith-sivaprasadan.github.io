<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='Thermal energy storage peak shaving for district cooling'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
    <linearGradient id='socfill' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0%' stop-color='#65d6c9' stop-opacity='0.25'/>
      <stop offset='100%' stop-color='#65d6c9' stop-opacity='0.05'/>
    </linearGradient>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>

  <!-- Title bar -->
  <rect x='24' y='14' width='912' height='36' rx='5' fill='#0d1a2e'/>
  <text x='44' y='38' font-family='monospace' font-size='14' fill='#65d6c9' font-weight='bold'>THERMAL ENERGY STORAGE · DISTRICT COOLING · PEAK SHAVING</text>

  <!-- System schematic (top right) -->
  <rect x='680' y='64' width='260' height='200' rx='6' fill='#0d1a2e' stroke='#152540' stroke-width='1'/>
  <text x='810' y='86' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>TES SYSTEM</text>
  <!-- Chiller -->
  <rect x='700' y='100' width='70' height='44' rx='4' fill='#0f2240' stroke='#38bdf8' stroke-width='1.5'/>
  <text x='735' y='122' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>CHILLER</text>
  <text x='735' y='136' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>4°C out</text>
  <!-- TES tank -->
  <rect x='800' y='92' width='60' height='60' rx='4' fill='#0f2240' stroke='#65d6c9' stroke-width='1.5'/>
  <text x='830' y='118' font-family='monospace' font-size='9' fill='#65d6c9' text-anchor='middle'>TES</text>
  <text x='830' y='132' font-family='monospace' font-size='8' fill='#65d6c9' text-anchor='middle'>TANK</text>
  <text x='830' y='146' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>8,000 m³</text>
  <!-- Pipe connections -->
  <line x1='770' y1='122' x2='800' y2='122' stroke='#38bdf8' stroke-width='1.5'/>
  <line x1='860' y1='122' x2='900' y2='122' stroke='#65d6c9' stroke-width='1.5'/>
  <!-- Building loads -->
  <rect x='896' y='100' width='36' height='30' rx='3' fill='#0f2240' stroke='#8f7fff' stroke-width='1'/>
  <text x='914' y='120' font-family='monospace' font-size='8' fill='#8f7fff' text-anchor='middle'>Loads</text>
  <!-- Return pipe -->
  <line x1='896' y1='148' x2='700' y2='160' stroke='#f6c85f' stroke-width='1' stroke-dasharray='3,2'/>
  <!-- Modes label -->
  <text x='700' y='175' font-family='monospace' font-size='9' fill='#65d6c9'>Night: CHARGE</text>
  <text x='700' y='190' font-family='monospace' font-size='9' fill='#d0622c'>Day: DISCHARGE</text>
  <text x='700' y='205' font-family='monospace' font-size='9' fill='#4ade80'>Peak: SHAVE</text>
  <text x='700' y='250' font-family='monospace' font-size='9' fill='#2a4060'>COP_effective = 6.8</text>
  <text x='700' y='265' font-family='monospace' font-size='9' fill='#2a4060'>Peak reduction: 45%</text>

  <!-- Main time-series chart -->
  <rect x='30' y='64' width='630' height='400' rx='4' fill='#0d1a2e'/>

  <!-- Chart axes -->
  <line x1='80' y1='80' x2='80' y2='430' stroke='#2a4060' stroke-width='1.2'/>
  <line x1='80' y1='430' x2='640' y2='430' stroke='#2a4060' stroke-width='1.2'/>

  <!-- Y-axis labels (left: MW cooling) -->
  <text x='74' y='434' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>0</text>
  <text x='74' y='384' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>10</text>
  <text x='74' y='334' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>20</text>
  <text x='74' y='284' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>30</text>
  <text x='74' y='234' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>40</text>
  <text x='74' y='184' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>50</text>
  <text x='74' y='134' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>60</text>
  <text x='60' y='270' font-family='monospace' font-size='9' fill='#2a4060' transform='rotate(-90,60,270)' text-anchor='middle'>MW cooling</text>

  <!-- X-axis labels (24 hours) -->
  <text x='80' y='446' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>00</text>
  <text x='150' y='446' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>03</text>
  <text x='220' y='446' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>06</text>
  <text x='290' y='446' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>09</text>
  <text x='360' y='446' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>12</text>
  <text x='430' y='446' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>15</text>
  <text x='500' y='446' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>18</text>
  <text x='570' y='446' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>21</text>
  <text x='635' y='446' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>24h</text>

  <!-- Grid lines vertical (6h intervals) -->
  <line x1='150' y1='80' x2='150' y2='430' stroke='#152540' stroke-width='0.7' stroke-dasharray='3,4'/>
  <line x1='220' y1='80' x2='220' y2='430' stroke='#152540' stroke-width='0.7' stroke-dasharray='3,4'/>
  <line x1='290' y1='80' x2='290' y2='430' stroke='#152540' stroke-width='0.7' stroke-dasharray='3,4'/>
  <line x1='360' y1='80' x2='360' y2='430' stroke='#152540' stroke-width='0.7' stroke-dasharray='3,4'/>
  <line x1='430' y1='80' x2='430' y2='430' stroke='#152540' stroke-width='0.7' stroke-dasharray='3,4'/>
  <line x1='500' y1='80' x2='500' y2='430' stroke='#152540' stroke-width='0.7' stroke-dasharray='3,4'/>
  <line x1='570' y1='80' x2='570' y2='430' stroke='#152540' stroke-width='0.7' stroke-dasharray='3,4'/>

  <!-- Cooling demand profile (peaks in daytime) -->
  <polyline points='80,400 100,398 130,395 150,390 175,380 200,365 220,345 240,315 265,285 280,255 290,235 300,215 320,200 340,185 360,170 380,162 400,160 415,162 430,168 445,175 460,182 480,195 500,215 520,240 540,265 555,290 570,315 580,340 595,365 610,385 625,398 635,400' fill='none' stroke='#d0622c' stroke-width='2.5'/>

  <!-- Chiller output (flattened/shifted curve - runs at night, off at day peak) -->
  <polyline points='80,334 100,334 130,334 150,334 175,334 200,334 220,334 240,334 265,334 280,334 290,334 300,400 320,400 340,400 360,400 380,400 400,400 415,400 430,400 445,334 460,334 480,334 500,334 520,334 540,334 555,334 570,334 580,334 595,334 610,334 625,334 635,334' fill='none' stroke='#38bdf8' stroke-width='2'/>

  <!-- TES State of Charge (SOC) filled area -->
  <polygon points='80,430 80,380 100,370 130,350 150,330 175,315 200,305 220,300 240,300 265,300 280,300 290,300 300,330 320,370 340,395 360,415 380,425 400,428 415,428 430,425 445,400 460,385 480,365 500,345 520,325 540,310 555,305 570,305 580,310 595,325 610,360 625,395 635,430' fill='url(#socfill)'/>
  <polyline points='80,380 100,370 130,350 150,330 175,315 200,305 220,300 240,300 265,300 280,300 290,300 300,330 320,370 340,395 360,415 380,425 400,428 415,428 430,425 445,400 460,385 480,365 500,345 520,325 540,310 555,305 570,305 580,310 595,325 610,360 625,395 635,430' fill='none' stroke='#65d6c9' stroke-width='1.8'/>

  <!-- Legend -->
  <rect x='88' y='88' width='250' height='78' rx='4' fill='#0d1a2e' stroke='#152540' stroke-width='1'/>
  <line x1='98' y1='106' x2='120' y2='106' stroke='#d0622c' stroke-width='2.5'/>
  <text x='128' y='110' font-family='monospace' font-size='10' fill='#d0622c'>Cooling demand</text>
  <line x1='98' y1='126' x2='120' y2='126' stroke='#38bdf8' stroke-width='2'/>
  <text x='128' y='130' font-family='monospace' font-size='10' fill='#38bdf8'>Chiller output (flat)</text>
  <line x1='98' y1='146' x2='120' y2='146' stroke='#65d6c9' stroke-width='1.8'/>
  <text x='128' y='150' font-family='monospace' font-size='10' fill='#65d6c9'>TES state of charge</text>

  <!-- Peak shaving annotation -->
  <line x1='390' y1='160' x2='390' y2='100' stroke='#f6c85f' stroke-width='1' stroke-dasharray='3,3'/>
  <rect x='380' y='90' width='100' height='28' rx='3' fill='#0d1a2e' stroke='#f6c85f' stroke-width='1'/>
  <text x='430' y='107' font-family='monospace' font-size='9' fill='#f6c85f' text-anchor='middle'>Peak -45%</text>

  <!-- Night charging label -->
  <text x='163' y='330' font-family='monospace' font-size='9' fill='#65d6c9' text-anchor='middle'>Charging</text>
  <!-- Day discharging label -->
  <text x='370' y='390' font-family='monospace' font-size='9' fill='#65d6c9' text-anchor='middle'>Discharging</text>

  <!-- Right panel KPIs -->
  <rect x='680' y='280' width='260' height='180' rx='6' fill='#0d1a2e' stroke='#152540' stroke-width='1'/>
  <text x='810' y='302' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>SIMULATION RESULTS</text>
  <line x1='690' y1='310' x2='930' y2='310' stroke='#152540' stroke-width='0.8'/>
  <text x='690' y='330' font-family='monospace' font-size='10' fill='#f6c85f'>Peak demand:</text>
  <text x='920' y='330' font-family='monospace' font-size='10' fill='#f6c85f' text-anchor='end'>60 MW → 33 MW</text>
  <text x='690' y='350' font-family='monospace' font-size='10' fill='#65d6c9'>TES capacity:</text>
  <text x='920' y='350' font-family='monospace' font-size='10' fill='#65d6c9' text-anchor='end'>48,000 kWh</text>
  <text x='690' y='370' font-family='monospace' font-size='10' fill='#38bdf8'>Chiller run-hours:</text>
  <text x='920' y='370' font-family='monospace' font-size='10' fill='#38bdf8' text-anchor='end'>−31%</text>
  <text x='690' y='390' font-family='monospace' font-size='10' fill='#4ade80'>Electricity saving:</text>
  <text x='920' y='390' font-family='monospace' font-size='10' fill='#4ade80' text-anchor='end'>18% annual</text>
  <text x='690' y='410' font-family='monospace' font-size='10' fill='#8f7fff'>Simple payback:</text>
  <text x='920' y='410' font-family='monospace' font-size='10' fill='#8f7fff' text-anchor='end'>6.2 years</text>
  <text x='690' y='445' font-family='monospace' font-size='9' fill='#2a4060'>Hourly simulation · TRNSYS-style</text>

  <!-- Bottom tag strip -->
  <rect x='24' y='490' width='912' height='34' rx='5' fill='#0d1a2e'/>
  <text x='44' y='512' font-family='monospace' font-size='11' fill='#2a4060'>TES · District cooling · Peak shaving · Hourly simulation · COP · Load shifting · Python</text>
</svg>
