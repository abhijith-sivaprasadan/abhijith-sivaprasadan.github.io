<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Redesigned C2 reducer geometry</title>
  <desc id="desc">Dark themed isometric-style diagram of the redesigned smooth quintic reducer geometry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07100c"/>
      <stop offset="1" stop-color="#101012"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1">
      <stop offset="0" stop-color="#355049"/>
      <stop offset="0.52" stop-color="#9bd69f"/>
      <stop offset="1" stop-color="#52635f"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" x2="1">
      <stop offset="0" stop-color="#65d6c9"/>
      <stop offset="0.65" stop-color="#9bd69f"/>
      <stop offset="1" stop-color="#d7b46a"/>
    </linearGradient>
  </defs>
  <rect width="960" height="600" fill="url(#bg)"/>
  <g opacity="0.2" stroke="#9bd69f" stroke-width="1">
    <path d="M0 112H960M0 224H960M0 336H960M0 448H960"/>
    <path d="M140 0V600M280 0V600M420 0V600M560 0V600M700 0V600M840 0V600"/>
  </g>
  <rect x="38" y="32" width="884" height="536" rx="12" fill="none" stroke="#2d3a31"/>
  <text x="62" y="72" fill="#d7b46a" font-family="Roboto Mono, monospace" font-size="20" font-weight="700">REDESIGNED GEOMETRY</text>
  <text x="62" y="103" fill="#a8ada4" font-family="Roboto, Arial, sans-serif" font-size="16">Long smooth C² contraction: pressure recovery improves when insulation handles external area.</text>

  <g transform="translate(62 70) skewY(-7)">
    <path d="M96 268H246C358 268 468 220 604 214H830V360H604C468 354 358 306 246 306H96Z" fill="url(#metal)" stroke="#dbe8df" stroke-width="2"/>
    <ellipse cx="96" cy="287" rx="42" ry="72" fill="#314b45" stroke="#dbe8df" stroke-width="2"/>
    <ellipse cx="830" cy="287" rx="28" ry="72" fill="#53645f" stroke="#dbe8df" stroke-width="2"/>
    <path d="M134 287H250C360 287 476 287 808 287" stroke="url(#flow)" stroke-width="7" stroke-linecap="round"/>
    <path d="M160 254C310 250 456 266 806 276" fill="none" stroke="#f2f0e7" stroke-opacity="0.38" stroke-width="2"/>
    <path d="M160 320C310 324 456 308 806 298" fill="none" stroke="#07100c" stroke-opacity="0.42" stroke-width="2"/>
  </g>

  <g font-family="Roboto Mono, monospace" font-size="15">
    <text x="132" y="500" fill="#f2f0e7">35.05 mm inlet</text>
    <text x="418" y="500" fill="#9bd69f">150 mm C² contraction</text>
    <text x="706" y="500" fill="#f2f0e7">6.0 mm outlet</text>
  </g>
  <path d="M286 422H674" fill="none" stroke="#d7b46a" stroke-width="2" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#d7b46a"/></marker>
  </defs>
  <text x="330" y="402" fill="#d7b46a" font-family="Roboto Mono, monospace" font-size="15">distributed acceleration, no step jet</text>
</svg>
