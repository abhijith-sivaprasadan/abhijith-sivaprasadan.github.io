<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Legacy reducer geometry</title>
  <desc id="desc">Dark themed isometric-style diagram of the legacy compact two-step reducer geometry.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07100c"/>
      <stop offset="1" stop-color="#101012"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" x2="1">
      <stop offset="0" stop-color="#2f3b40"/>
      <stop offset="0.5" stop-color="#9aa7a8"/>
      <stop offset="1" stop-color="#435052"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" x2="1">
      <stop offset="0" stop-color="#65d6c9"/>
      <stop offset="0.65" stop-color="#d7b46a"/>
      <stop offset="1" stop-color="#d98b7d"/>
    </linearGradient>
  </defs>
  <rect width="960" height="600" fill="url(#bg)"/>
  <g opacity="0.2" stroke="#9bd69f" stroke-width="1">
    <path d="M0 112H960M0 224H960M0 336H960M0 448H960"/>
    <path d="M140 0V600M280 0V600M420 0V600M560 0V600M700 0V600M840 0V600"/>
  </g>
  <rect x="38" y="32" width="884" height="536" rx="12" fill="none" stroke="#2d3a31"/>
  <text x="62" y="72" fill="#d7b46a" font-family="Roboto Mono, monospace" font-size="20" font-weight="700">LEGACY GEOMETRY</text>
  <text x="62" y="103" fill="#a8ada4" font-family="Roboto, Arial, sans-serif" font-size="16">Compact commercial-style two-step reducer: thermally compact, aerodynamically abrupt.</text>

  <g transform="translate(74 54) skewY(-8)">
    <path d="M86 284H382V236H504V190H744V384H504V338H382V290H86Z" fill="url(#metal)" stroke="#c7d0cc" stroke-width="2"/>
    <path d="M86 284H382V236H504V190" fill="none" stroke="#f2f0e7" stroke-opacity="0.55"/>
    <path d="M382 290V338H504V384" fill="none" stroke="#07100c" stroke-opacity="0.55"/>
    <ellipse cx="86" cy="287" rx="42" ry="94" fill="#2d3738" stroke="#c7d0cc" stroke-width="2"/>
    <ellipse cx="744" cy="287" rx="40" ry="94" fill="#495557" stroke="#c7d0cc" stroke-width="2"/>
    <path d="M122 287H370" stroke="url(#hot)" stroke-width="10" stroke-linecap="round"/>
    <path d="M386 287H498" stroke="#d7b46a" stroke-width="7" stroke-linecap="round"/>
    <path d="M514 287H720" stroke="#65d6c9" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g font-family="Roboto Mono, monospace" font-size="15" fill="#f2f0e7">
    <text x="146" y="500">35.05 mm inlet</text>
    <text x="404" y="500">11.25 mm step</text>
    <text x="664" y="500">6.0 mm outlet</text>
  </g>
  <g fill="none" stroke="#d98b7d" stroke-width="2.4">
    <path d="M452 396C486 362 520 366 552 396"/>
    <path d="M452 224C486 258 520 254 552 224"/>
  </g>
  <text x="402" y="154" fill="#d98b7d" font-family="Roboto Mono, monospace" font-size="15">abrupt contraction zones</text>
</svg>
