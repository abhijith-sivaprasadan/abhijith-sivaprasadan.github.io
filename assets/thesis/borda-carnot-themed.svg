<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Borda-Carnot step contraction mechanism</title>
  <desc id="desc">Dark themed diagram showing abrupt legacy reducer contraction, vena contracta, recirculation and total pressure loss.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07100c"/>
      <stop offset="0.58" stop-color="#0f1719"/>
      <stop offset="1" stop-color="#101012"/>
    </linearGradient>
    <linearGradient id="duct" x1="0" x2="1">
      <stop offset="0" stop-color="#9bd69f" stop-opacity="0.2"/>
      <stop offset="0.55" stop-color="#65d6c9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d7b46a" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" x2="1">
      <stop offset="0" stop-color="#65d6c9"/>
      <stop offset="0.56" stop-color="#d7b46a"/>
      <stop offset="1" stop-color="#d98b7d"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#65d6c9"/>
    </marker>
    <marker id="lossArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#d98b7d"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="960" height="600" fill="url(#bg)"/>
  <g opacity="0.24" stroke="#9bd69f" stroke-width="1">
    <path d="M0 96H960M0 192H960M0 288H960M0 384H960M0 480H960"/>
    <path d="M120 0V600M240 0V600M360 0V600M480 0V600M600 0V600M720 0V600M840 0V600"/>
  </g>
  <rect x="38" y="32" width="884" height="536" rx="12" fill="none" stroke="#2d3a31"/>
  <text x="62" y="72" fill="#d7b46a" font-family="Roboto Mono, monospace" font-size="20" font-weight="700">LEGACY TWO-STEP REDUCER: BORDA-CARNOT LOSS MECHANISM</text>
  <text x="62" y="103" fill="#a8ada4" font-family="Roboto, Arial, sans-serif" font-size="16">Abrupt area contraction creates a separated jet, recirculation pockets and irreversible total pressure loss.</text>

  <path d="M86 204H368V252H520V348H368V396H86Z" fill="url(#duct)" stroke="#8fa7b3" stroke-width="2"/>
  <path d="M520 252H860V348H520Z" fill="#0b1214" stroke="#8fa7b3" stroke-width="2"/>
  <path d="M86 204H368V252H520V348H368V396H86Z" fill="none" stroke="#9bd69f" stroke-opacity="0.55" stroke-width="1"/>

  <g fill="none" stroke="#65d6c9" stroke-width="4" marker-end="url(#arrow)" opacity="0.9">
    <path d="M118 300C196 300 268 300 342 300"/>
    <path d="M130 246C210 258 282 282 342 294"/>
    <path d="M130 354C210 342 282 318 342 306"/>
  </g>
  <path d="M360 300C414 262 462 262 522 300C616 358 728 348 842 314" fill="none" stroke="url(#flow)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M360 300C414 338 462 338 522 300C616 242 728 252 842 286" fill="none" stroke="url(#flow)" stroke-width="10" stroke-linecap="round" filter="url(#glow)"/>

  <g fill="none" stroke="#d98b7d" stroke-width="3" opacity="0.84">
    <path d="M410 230C460 204 508 214 536 248"/>
    <path d="M410 370C460 396 508 386 536 352"/>
    <path d="M456 234C482 238 503 249 520 269"/>
    <path d="M456 366C482 362 503 351 520 331"/>
  </g>
  <text x="402" y="205" fill="#d98b7d" font-family="Roboto Mono, monospace" font-size="15">recirculation</text>
  <text x="402" y="426" fill="#d98b7d" font-family="Roboto Mono, monospace" font-size="15">recirculation</text>

  <line x1="352" y1="448" x2="520" y2="448" stroke="#d7b46a" stroke-width="2" marker-end="url(#lossArrow)"/>
  <text x="350" y="482" fill="#f2f0e7" font-family="Roboto, Arial, sans-serif" font-size="18" font-weight="700">vena contracta</text>
  <text x="560" y="452" fill="#d98b7d" font-family="Roboto Mono, monospace" font-size="17">total pressure loss</text>

  <g transform="translate(92 494)">
    <rect width="222" height="46" rx="8" fill="#101410" stroke="#2d3a31"/>
    <text x="16" y="29" fill="#f2f0e7" font-family="Roboto Mono, monospace" font-size="15">35.05 mm -> 11.25 mm -> 6.0 mm</text>
  </g>
  <g transform="translate(646 494)">
    <rect width="214" height="46" rx="8" fill="#101410" stroke="#2d3a31"/>
    <text x="16" y="29" fill="#f2f0e7" font-family="Roboto Mono, monospace" font-size="15">Ma spike + jet recovery</text>
  </g>
</svg>
