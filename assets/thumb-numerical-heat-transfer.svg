  <rect x='30' y='64' width='550' height='410' rx='4' fill='#0d1a2e'/>
  <text x='305' y='86' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>2D CONDUCTION — STEADY-STATE FD SOLUTION (9×7 NODES)</text>

  <!-- Temperature gradient fill behind grid -->
  <rect x='70' y='100' width='470' height='310' fill='url(#heatgrad)' rx='2' opacity='0.5'/>

  <!-- Grid nodes and lines: 9 columns x 7 rows -->
  <!-- x positions: 70, 122, 174, 226, 278, 330, 382, 434, 540  (step 52) wait that doesn't fit -->
  <!-- 9 columns from x=70 to x=540: step = 470/8 = 58.75 ≈ 59 -->
  <!-- 7 rows from y=100 to y=410: step = 310/6 = 51.67 ≈ 52 -->

  <!-- Horizontal grid lines -->
  <line x1='70' y1='100' x2='540' y2='100' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='70' y1='152' x2='540' y2='152' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='70' y1='204' x2='540' y2='204' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='70' y1='256' x2='540' y2='256' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='70' y1='308' x2='540' y2='308' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='70' y1='360' x2='540' y2='360' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='70' y1='410' x2='540' y2='410' stroke='#2a4060' stroke-width='0.8'/>

  <!-- Vertical grid lines (9 cols, step ≈ 59) -->
  <line x1='70' y1='100' x2='70' y2='410' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='129' y1='100' x2='129' y2='410' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='188' y1='100' x2='188' y2='410' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='247' y1='100' x2='247' y2='410' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='306' y1='100' x2='306' y2='410' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='365' y1='100' x2='365' y2='410' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='424' y1='100' x2='424' y2='410' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='483' y1='100' x2='483' y2='410' stroke='#2a4060' stroke-width='0.8'/>
  <line x1='540' y1='100' x2='540' y2='410' stroke='#2a4060' stroke-width='0.8'/>

