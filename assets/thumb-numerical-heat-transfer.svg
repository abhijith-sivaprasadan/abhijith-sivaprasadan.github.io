  <circle cx='483' cy='152' r='3' fill='#2c80c8' opacity='0.8'/>
  <circle cx='540' cy='152' r='3.5' fill='#2563a8'/>

  <circle cx='70' cy='204' r='3.5' fill='#d0622c'/>
  <circle cx='306' cy='204' r='3' fill='#65d6c9' opacity='0.8'/>
  <circle cx='540' cy='204' r='3.5' fill='#2563a8'/>

