<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='Numerical heat transfer finite difference 2D conduction isotherm grid explicit implicit scheme'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
    <linearGradient id='heatgrad' x1='0' y1='0' x2='1' y2='0'>
      <stop offset='0%' stop-color='#d0622c' stop-opacity='0.7'/>
      <stop offset='25%' stop-color='#f6c85f' stop-opacity='0.5'/>
      <stop offset='50%' stop-color='#65d6c9' stop-opacity='0.35'/>
      <stop offset='75%' stop-color='#38bdf8' stop-opacity='0.4'/>
      <stop offset='100%' stop-color='#2563a8' stop-opacity='0.6'/>
    </linearGradient>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>

  <!-- Title bar -->
  <rect x='24' y='14' width='912' height='36' rx='5' fill='#0d1a2e'/>
  <text x='44' y='38' font-family='monospace' font-size='14' fill='#65d6c9' font-weight='bold'>NUMERICAL HEAT TRANSFER · 2D FINITE DIFFERENCE · ISOTHERM CONTOURS</text>

