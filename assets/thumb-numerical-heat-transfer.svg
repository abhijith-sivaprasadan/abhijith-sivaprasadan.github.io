  <circle cx='540' cy='360' r='3.5' fill='#2563a8'/>

  <circle cx='70' cy='410' r='3.5' fill='#d0622c'/>
  <circle cx='129' cy='410' r='3.5' fill='#e07044'/>
  <circle cx='188' cy='410' r='3.5' fill='#f0a060'/>
  <circle cx='247' cy='410' r='3.5' fill='#f0c080'/>
