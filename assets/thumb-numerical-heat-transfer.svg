  <circle cx='540' cy='410' r='3.5' fill='#2563a8'/>

  <!-- Isotherm contour lines (smooth curves) -->
  <!-- T=175°C isotherm (close to hot wall) -->
  <path d='M 129,100 Q 135,200 129,305 Q 133,360 129,410' fill='none' stroke='#d87040' stroke-width='1.5' opacity='0.7'/>
  <!-- T=150°C -->
  <path d='M 188,100 Q 196,200 188,305 Q 192,360 188,410' fill='none' stroke='#e8a040' stroke-width='1.5' opacity='0.7'/>
  <!-- T=120°C -->
  <path d='M 247,100 Q 258,200 247,305 Q 253,360 247,410' fill='none' stroke='#f0c860' stroke-width='1.5' opacity='0.7'/>
  <!-- T=100°C (midplane) -->
  <path d='M 306,100 Q 308,255 306,410' fill='none' stroke='#65d6c9' stroke-width='1.8' stroke-dasharray='5,3' opacity='0.9'/>
  <!-- T=80°C -->
  <path d='M 365,100 Q 356,200 365,305 Q 360,360 365,410' fill='none' stroke='#4ab8d4' stroke-width='1.5' opacity='0.7'/>
  <!-- T=50°C -->
  <path d='M 424,100 Q 414,200 424,305 Q 418,360 424,410' fill='none' stroke='#38a0d8' stroke-width='1.5' opacity='0.7'/>
  <!-- T=30°C -->
  <path d='M 483,100 Q 471,200 483,305 Q 476,360 483,410' fill='none' stroke='#2c85c4' stroke-width='1.5' opacity='0.7'/>

  <!-- Hot wall label -->
  <rect x='30' y='100' width='40' height='310' rx='2' fill='#d0622c' opacity='0.35'/>
  <text x='50' y='262' font-family='monospace' font-size='10' fill='#d0622c' text-anchor='middle' transform='rotate(-90,50,262)' font-weight='bold'>T_hot = 200°C</text>

  <!-- Cold wall label -->
  <rect x='540' y='100' width='38' height='310' rx='2' fill='#2563a8' opacity='0.35'/>
  <text x='559' y='262' font-family='monospace' font-size='10' fill='#38bdf8' text-anchor='middle' transform='rotate(-90,559,262)' font-weight='bold'>T_cold = 20°C</text>

  <!-- Insulated wall labels -->
  <text x='305' y='97' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>insulated (∂T/∂y = 0)</text>
  <text x='305' y='423' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>insulated (∂T/∂y = 0)</text>

  <!-- Isotherm label -->
  <text x='310' y='242' font-family='monospace' font-size='9' fill='#65d6c9'>T = 100°C</text>

  <!-- Right panel: scheme comparison + convergence -->
  <rect x='596' y='64' width='350' height='410' rx='4' fill='#0d1a2e'/>
  <text x='771' y='86' font-family='monospace' font-size='10' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>SCHEME COMPARISON &amp; TEMPERATURE PROFILE</text>

  <!-- Temperature profile along centreline (x-direction at j=mid) -->
  <text x='771' y='112' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>T(x) along centreline y = L/2</text>
  <line x1='620' y1='120' x2='620' y2='230' stroke='#2a4060' stroke-width='1'/>
  <line x1='620' y1='230' x2='930' y2='230' stroke='#2a4060' stroke-width='1'/>
  <!-- T profile line (linear for 1D) -->
  <polyline points='620,128 930,218' fill='none' stroke='#65d6c9' stroke-width='2'/>
  <!-- x labels -->
  <text x='620' y='244' font-family='monospace' font-size='8' fill='#2a4060'>x=0</text>
  <text x='930' y='244' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='end'>x=L</text>
  <!-- T labels -->
  <text x='614' y='132' font-family='monospace' font-size='8' fill='#d0622c' text-anchor='end'>200</text>
  <text x='614' y='222' font-family='monospace' font-size='8' fill='#38bdf8' text-anchor='end'>20°C</text>

  <!-- FD stencil diagram -->
  <text x='771' y='270' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>FD STENCIL (central difference)</text>
  <!-- Interior node pattern -->
  <circle cx='771' cy='300' r='6' fill='#2563a8' opacity='0.9'/>
  <circle cx='731' cy='300' r='5' fill='#2a4060' opacity='0.9'/>
  <circle cx='811' cy='300' r='5' fill='#2a4060' opacity='0.9'/>
  <circle cx='771' cy='268' r='5' fill='#2a4060' opacity='0.9'/>
  <circle cx='771' cy='332' r='5' fill='#2a4060' opacity='0.9'/>
  <line x1='737' y1='300' x2='765' y2='300' stroke='#38bdf8' stroke-width='1.5'/>
  <line x1='777' y1='300' x2='805' y2='300' stroke='#38bdf8' stroke-width='1.5'/>
  <line x1='771' y1='274' x2='771' y2='294' stroke='#38bdf8' stroke-width='1.5'/>
  <line x1='771' y1='306' x2='771' y2='326' stroke='#38bdf8' stroke-width='1.5'/>
  <text x='856' y='295' font-family='monospace' font-size='8' fill='#38bdf8'>T_{i+1,j}</text>
  <text x='680' y='295' font-family='monospace' font-size='8' fill='#38bdf8' text-anchor='end'>T_{i-1,j}</text>
  <text x='771' y='260' font-family='monospace' font-size='8' fill='#38bdf8' text-anchor='middle'>T_{i,j-1}</text>
  <text x='771' y='350' font-family='monospace' font-size='8' fill='#38bdf8' text-anchor='middle'>T_{i,j+1}</text>
  <text x='785' y='305' font-family='monospace' font-size='9' fill='#65d6c9'>T_{i,j}</text>

  <!-- Convergence comparison box -->
  <rect x='608' y='370' width='330' height='92' rx='4' fill='#0d1a2e' stroke='#152540' stroke-width='1'/>
  <text x='773' y='390' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>NUMERICAL PARAMETERS</text>
  <text x='616' y='408' font-family='monospace' font-size='9' fill='#2a4060'>Grid: 9×7 nodes · Δx = Δy = L/8</text>
  <text x='616' y='424' font-family='monospace' font-size='9' fill='#2a4060'>Explicit Fo ≤ 0.25 · Implicit unconditional</text>
  <text x='616' y='440' font-family='monospace' font-size='9' fill='#38bdf8'>Residual tolerance: ε &lt; 10⁻⁵</text>
  <text x='616' y='456' font-family='monospace' font-size='9' fill='#4ade80'>Converged in 47 iterations (SOR ω=1.6)</text>

  <!-- Bottom tag strip -->
  <rect x='24' y='490' width='912' height='34' rx='5' fill='#0d1a2e'/>
  <text x='44' y='512' font-family='monospace' font-size='11' fill='#2a4060'>FD · 2D conduction · Isotherms · Explicit · Implicit · TDMA · Gauss-Seidel · MATLAB/Python</text>
</svg>
