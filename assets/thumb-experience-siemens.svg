<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='Siemens Energy test rig measurement chain and CFD workflow'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
    <marker id='arr' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#38bdf8'/>
    </marker>
    <marker id='aro' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#d0622c'/>
    </marker>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>

  <!-- Title bar -->
  <rect x='24' y='14' width='912' height='36' rx='5' fill='#0d1a2e'/>
  <text x='44' y='38' font-family='monospace' font-size='14' fill='#65d6c9' font-weight='bold'>SIEMENS ENERGY · FLUID DYNAMIC LAB · TEST ENGINEER THESIS</text>

  <!-- TEST RIG SCHEMATIC (top half) -->
  <!-- Label -->
  <text x='480' y='80' font-family='monospace' font-size='12' fill='#2a4060' text-anchor='middle' font-weight='bold'>PULSATORN CALIBRATION RIG — MEASUREMENT CHAIN</text>

  <!-- Heater element -->
  <rect x='50' y='100' width='120' height='110' rx='6' fill='#0d1a2e' stroke='#d0622c' stroke-width='2'/>
  <text x='110' y='130' font-family='monospace' font-size='11' fill='#d0622c' text-anchor='middle' font-weight='bold'>HEATER</text>
  <line x1='70' y1='142' x2='150' y2='142' stroke='#d0622c' stroke-width='0.8' stroke-dasharray='4,3'/>
  <line x1='70' y1='155' x2='150' y2='155' stroke='#f6c85f' stroke-width='0.8' stroke-dasharray='4,3'/>
  <line x1='70' y1='168' x2='150' y2='168' stroke='#d0622c' stroke-width='0.8' stroke-dasharray='4,3'/>
  <text x='110' y='196' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>T_max = 700°C</text>

  <!-- Arrow heater → reducer -->
  <line x1='172' y1='155' x2='222' y2='155' stroke='#d0622c' stroke-width='2' marker-end='url(#aro)'/>
  <text x='196' y='144' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>hot gas</text>

  <!-- Reducer section -->
  <rect x='224' y='100' width='140' height='110' rx='6' fill='#0d1a2e' stroke='#38bdf8' stroke-width='2'/>
  <text x='294' y='125' font-family='monospace' font-size='11' fill='#38bdf8' text-anchor='middle' font-weight='bold'>REDUCER</text>
  <!-- Mini duct shape inside -->
  <polyline points='240,140 270,140 300,152 364,152' fill='none' stroke='#38bdf8' stroke-width='1.5'/>
  <polyline points='240,170 270,170 300,158 364,158' fill='none' stroke='#38bdf8' stroke-width='1.5'/>
  <line x1='240' y1='140' x2='240' y2='170' stroke='#38bdf8' stroke-width='1.5'/>
  <text x='294' y='196' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>CHT · CFD model</text>

  <!-- TC probes on reducer -->
  <line x1='264' y1='100' x2='264' y2='88' stroke='#f6c85f' stroke-width='1.5'/>
  <circle cx='264' cy='84' r='5' fill='none' stroke='#f6c85f' stroke-width='1.5'/>
  <text x='264' y='76' font-family='monospace' font-size='9' fill='#f6c85f' text-anchor='middle'>TC</text>
  <line x1='324' y1='100' x2='324' y2='88' stroke='#f6c85f' stroke-width='1.5'/>
  <circle cx='324' cy='84' r='5' fill='none' stroke='#f6c85f' stroke-width='1.5'/>

  <!-- Arrow reducer → sensor volume -->
  <line x1='366' y1='155' x2='408' y2='155' stroke='#38bdf8' stroke-width='2' marker-end='url(#arr)'/>

  <!-- Sensor / test volume -->
  <rect x='410' y='100' width='120' height='110' rx='6' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <text x='470' y='125' font-family='monospace' font-size='11' fill='#65d6c9' text-anchor='middle' font-weight='bold'>SENSOR</text>
  <text x='470' y='140' font-family='monospace' font-size='11' fill='#65d6c9' text-anchor='middle' font-weight='bold'>VOLUME</text>
  <!-- Pressure sensor symbol -->
  <circle cx='470' cy='162' r='12' fill='none' stroke='#65d6c9' stroke-width='1.5'/>
  <text x='470' y='166' font-family='monospace' font-size='9' fill='#65d6c9' text-anchor='middle'>p_dyn</text>
  <text x='470' y='196' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Dynamic pressure</text>

  <!-- Arrow down from sensors to DAQ -->
  <line x1='430' y1='212' x2='430' y2='248' stroke='#f6c85f' stroke-width='1.5' marker-end='url(#arr)'/>
  <line x1='470' y1='212' x2='470' y2='248' stroke='#65d6c9' stroke-width='1.5' marker-end='url(#arr)'/>
  <line x1='510' y1='212' x2='510' y2='248' stroke='#f6c85f' stroke-width='1.5' marker-end='url(#arr)'/>
  <text x='470' y='238' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>analog signals</text>

  <!-- NI-DAQ box -->
  <rect x='360' y='250' width='220' height='80' rx='6' fill='#0d1a2e' stroke='#f6c85f' stroke-width='2'/>
  <text x='470' y='272' font-family='monospace' font-size='12' fill='#f6c85f' text-anchor='middle' font-weight='bold'>NI-DAQ</text>
  <!-- Connector pins -->
  <rect x='370' y='280' width='12' height='8' rx='1' fill='#f6c85f' opacity='0.6'/>
  <rect x='388' y='280' width='12' height='8' rx='1' fill='#f6c85f' opacity='0.6'/>
  <rect x='406' y='280' width='12' height='8' rx='1' fill='#f6c85f' opacity='0.6'/>
  <rect x='424' y='280' width='12' height='8' rx='1' fill='#65d6c9' opacity='0.6'/>
  <rect x='442' y='280' width='12' height='8' rx='1' fill='#65d6c9' opacity='0.6'/>
  <text x='470' y='318' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>USB-6210 channel mapping</text>

  <!-- Arrow DAQ → LabVIEW -->
  <line x1='582' y1='290' x2='632' y2='290' stroke='#38bdf8' stroke-width='1.5' marker-end='url(#arr)'/>
  <text x='607' y='282' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>USB</text>

  <!-- LabVIEW box -->
  <rect x='634' y='250' width='150' height='80' rx='6' fill='#0d1a2e' stroke='#8f7fff' stroke-width='2'/>
  <text x='709' y='272' font-family='monospace' font-size='12' fill='#8f7fff' text-anchor='middle' font-weight='bold'>LabVIEW VI</text>
  <!-- Mini VI schematic -->
  <rect x='648' y='282' width='30' height='18' rx='2' fill='#152540' stroke='#8f7fff' stroke-width='0.8'/>
  <line x1='678' y1='291' x2='694' y2='291' stroke='#8f7fff' stroke-width='0.8'/>
  <rect x='694' y='282' width='30' height='18' rx='2' fill='#152540' stroke='#8f7fff' stroke-width='0.8'/>
  <line x1='724' y1='291' x2='740' y2='291' stroke='#8f7fff' stroke-width='0.8'/>
  <rect x='740' y='282' width='30' height='18' rx='2' fill='#152540' stroke='#8f7fff' stroke-width='0.8'/>
  <text x='709' y='318' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Synchronized acquisition</text>

  <!-- CFD workflow on right -->
  <rect x='820' y='90' width='118' height='250' rx='6' fill='#0d1a2e' stroke='#2563a8' stroke-width='1.5'/>
  <text x='879' y='112' font-family='monospace' font-size='11' fill='#2563a8' text-anchor='middle' font-weight='bold'>CFD</text>
  <text x='879' y='126' font-family='monospace' font-size='11' fill='#2563a8' text-anchor='middle' font-weight='bold'>WORKFLOW</text>
  <line x1='830' y1='136' x2='928' y2='136' stroke='#152540' stroke-width='0.8'/>
  <text x='879' y='154' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>SpaceClaim</text>
  <text x='879' y='168' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>geometry prep</text>
  <line x1='879' y1='174' x2='879' y2='188' stroke='#2563a8' stroke-width='1' marker-end='url(#arr)'/>
  <text x='879' y='202' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>Meshing</text>
  <text x='879' y='216' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>3-level study</text>
  <line x1='879' y1='222' x2='879' y2='236' stroke='#2563a8' stroke-width='1' marker-end='url(#arr)'/>
  <text x='879' y='250' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle'>Fluent CHT</text>
  <text x='879' y='264' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>k-omega SST</text>
  <line x1='879' y1='270' x2='879' y2='284' stroke='#2563a8' stroke-width='1' marker-end='url(#arr)'/>
  <text x='879' y='298' font-family='monospace' font-size='9' fill='#65d6c9' text-anchor='middle'>Post-processing</text>
  <text x='879' y='312' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>Biot · Ma · KPI</text>
  <line x1='879' y1='318' x2='879' y2='328' stroke='#2563a8' stroke-width='1'/>

  <!-- Root cause analysis badge -->
  <rect x='50' y='360' width='220' height='60' rx='6' fill='#0d1a2e' stroke='#d0622c' stroke-width='1.5'/>
  <text x='160' y='382' font-family='monospace' font-size='11' fill='#d0622c' text-anchor='middle' font-weight='bold'>HEATER FAILURE EVENT</text>
  <text x='160' y='400' font-family='monospace' font-size='10' fill='#2a4060' text-anchor='middle'>Root cause analysis</text>
  <text x='160' y='414' font-family='monospace' font-size='10' fill='#2a4060' text-anchor='middle'>→ approved scope revision</text>

  <!-- Bottom tag strip -->
  <rect x='24' y='490' width='912' height='34' rx='5' fill='#0d1a2e'/>
  <text x='44' y='512' font-family='monospace' font-size='11' fill='#2a4060'>ANSYS Fluent · NI-DAQ · LabVIEW · Siemens NX · Teamcenter PLM · Root Cause Analysis · T = 700°C</text>
</svg>
