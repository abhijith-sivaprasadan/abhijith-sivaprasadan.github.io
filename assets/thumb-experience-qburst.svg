<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='QBurst REST API NestJS TypeORM PostgreSQL backend software architecture'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
    <marker id='arr' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#38bdf8'/>
    </marker>
    <marker id='arw' markerWidth='7' markerHeight='6' refX='6' refY='3' orient='auto'>
      <path d='M0,0 L0,6 L7,3 z' fill='#c8d8ea'/>
    </marker>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>

  <!-- Title bar -->
  <rect x='24' y='14' width='912' height='36' rx='5' fill='#0d1a2e'/>
  <text x='44' y='38' font-family='monospace' font-size='14' fill='#38bdf8' font-weight='bold'>QBURST · REST API BACKEND · NestJS + TypeORM + PostgreSQL</text>

  <!-- Left: Client -->
  <rect x='30' y='96' width='130' height='100' rx='6' fill='#0d1a2e' stroke='#2a4060' stroke-width='1.5'/>
  <text x='95' y='124' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>CLIENT</text>
  <!-- Browser icon mockup -->
  <rect x='52' y='134' width='86' height='46' rx='3' fill='#0f2240' stroke='#2a4060' stroke-width='1'/>
  <rect x='52' y='134' width='86' height='10' rx='3' fill='#2a4060'/>
  <rect x='56' y='148' width='78' height='26' rx='1' fill='#152540'/>
  <text x='95' y='164' font-family='monospace' font-size='8' fill='#38bdf8' text-anchor='middle'>browser / app</text>

  <!-- HTTPS arrow -->
  <line x1='160' y1='146' x2='196' y2='146' stroke='#38bdf8' stroke-width='2' marker-end='url(#arr)'/>
  <text x='178' y='140' font-family='monospace' font-size='8' fill='#38bdf8' text-anchor='middle'>HTTPS</text>
  <text x='178' y='156' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>JSON/REST</text>

  <!-- Response arrow back -->
  <line x1='196' y1='158' x2='160' y2='158' stroke='#65d6c9' stroke-width='1.5' stroke-dasharray='4,2'/>

  <!-- JWT Auth Middleware -->
  <rect x='196' y='70' width='168' height='54' rx='5' fill='#0d1a2e' stroke='#f6c85f' stroke-width='1.5'/>
  <text x='280' y='93' font-family='monospace' font-size='10' fill='#f6c85f' text-anchor='middle' font-weight='bold'>JWT AUTH MIDDLEWARE</text>
  <text x='280' y='110' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Bearer token · Guards · Passport.js</text>
  <line x1='280' y1='124' x2='280' y2='142' stroke='#f6c85f' stroke-width='1.5' marker-end='url(#arr)'/>

  <!-- NestJS Controller box -->
  <rect x='196' y='142' width='168' height='220' rx='6' fill='#0d1a2e' stroke='#38bdf8' stroke-width='2'/>
  <text x='280' y='164' font-family='monospace' font-size='11' fill='#38bdf8' text-anchor='middle' font-weight='bold'>NestJS</text>
  <text x='280' y='180' font-family='monospace' font-size='11' fill='#38bdf8' text-anchor='middle' font-weight='bold'>CONTROLLERS</text>

  <!-- Route tree -->
  <!-- GET routes (cyan) -->
  <rect x='208' y='192' width='144' height='18' rx='2' fill='#0f3040' stroke='#65d6c9' stroke-width='1'/>
  <text x='218' y='204' font-family='monospace' font-size='8' fill='#65d6c9' font-weight='bold'>GET</text>
  <text x='248' y='204' font-family='monospace' font-size='8' fill='#c8d8ea'>/api/products</text>

  <rect x='208' y='214' width='144' height='18' rx='2' fill='#0f3040' stroke='#65d6c9' stroke-width='1'/>
  <text x='218' y='226' font-family='monospace' font-size='8' fill='#65d6c9' font-weight='bold'>GET</text>
  <text x='248' y='226' font-family='monospace' font-size='8' fill='#c8d8ea'>/api/products/:id</text>

  <!-- POST routes (green) -->
  <rect x='208' y='236' width='144' height='18' rx='2' fill='#0f3820' stroke='#4ade80' stroke-width='1'/>
  <text x='218' y='248' font-family='monospace' font-size='8' fill='#4ade80' font-weight='bold'>POST</text>
  <text x='250' y='248' font-family='monospace' font-size='8' fill='#c8d8ea'>/api/products</text>

  <rect x='208' y='258' width='144' height='18' rx='2' fill='#0f3820' stroke='#4ade80' stroke-width='1'/>
  <text x='218' y='270' font-family='monospace' font-size='8' fill='#4ade80' font-weight='bold'>POST</text>
  <text x='250' y='270' font-family='monospace' font-size='8' fill='#c8d8ea'>/api/orders</text>

  <!-- PATCH route (amber) -->
  <rect x='208' y='280' width='144' height='18' rx='2' fill='#2a1a00' stroke='#f6c85f' stroke-width='1'/>
  <text x='218' y='292' font-family='monospace' font-size='8' fill='#f6c85f' font-weight='bold'>PATCH</text>
  <text x='255' y='292' font-family='monospace' font-size='8' fill='#c8d8ea'>/api/products/:id</text>

  <!-- DELETE route (red/orange) -->
  <rect x='208' y='302' width='144' height='18' rx='2' fill='#2a0a08' stroke='#d0622c' stroke-width='1'/>
  <text x='218' y='314' font-family='monospace' font-size='8' fill='#d0622c' font-weight='bold'>DELETE</text>
  <text x='260' y='314' font-family='monospace' font-size='8' fill='#c8d8ea'>/api/orders/:id</text>

  <!-- TypeScript badge -->
  <rect x='210' y='330' width='60' height='22' rx='3' fill='#2563a8'/>
  <text x='240' y='345' font-family='monospace' font-size='9' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>TypeScript</text>

  <!-- NestJS service arrow down to TypeORM -->
  <line x1='280' y1='362' x2='280' y2='398' stroke='#38bdf8' stroke-width='2' marker-end='url(#arr)'/>
  <text x='292' y='384' font-family='monospace' font-size='8' fill='#2a4060'>service layer</text>

  <!-- TypeORM box -->
  <rect x='196' y='398' width='168' height='56' rx='5' fill='#0d1a2e' stroke='#8f7fff' stroke-width='1.5'/>
  <text x='280' y='421' font-family='monospace' font-size='11' fill='#8f7fff' text-anchor='middle' font-weight='bold'>TypeORM</text>
  <text x='280' y='440' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Entities · Migrations · Repositories</text>

  <!-- TypeORM to DB arrow -->
  <line x1='364' y1='426' x2='400' y2='426' stroke='#8f7fff' stroke-width='2' marker-end='url(#arr)'/>

  <!-- PostgreSQL DB -->
  <rect x='400' y='396' width='130' height='60' rx='5' fill='#0d1a2e' stroke='#4ade80' stroke-width='2'/>
  <text x='465' y='420' font-family='monospace' font-size='11' fill='#4ade80' text-anchor='middle' font-weight='bold'>PostgreSQL</text>
  <text x='465' y='438' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>v15 · indexes · JSONB</text>
  <!-- DB cylinder decoration -->
  <ellipse cx='465' cy='446' rx='52' ry='6' fill='none' stroke='#4ade80' stroke-width='1' opacity='0.5'/>

  <!-- Right panel: DB schema + test coverage -->
  <rect x='546' y='64' width='400' height='420' rx='4' fill='#0d1a2e'/>
  <text x='746' y='86' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>DB SCHEMA + API TESTING</text>

  <!-- Schema (Entity relationship diagram) -->
  <!-- Users table -->
  <rect x='562' y='100' width='150' height='120' rx='4' fill='#0f2240' stroke='#38bdf8' stroke-width='1.5'/>
  <rect x='562' y='100' width='150' height='22' rx='4' fill='#0d3860'/>
  <text x='637' y='115' font-family='monospace' font-size='10' fill='#38bdf8' text-anchor='middle' font-weight='bold'>users</text>
  <text x='570' y='136' font-family='monospace' font-size='9' fill='#65d6c9'>PK  id: uuid</text>
  <text x='570' y='152' font-family='monospace' font-size='9' fill='#2a4060'>    email: varchar</text>
  <text x='570' y='168' font-family='monospace' font-size='9' fill='#2a4060'>    role: enum</text>
  <text x='570' y='184' font-family='monospace' font-size='9' fill='#2a4060'>    created_at</text>
  <text x='570' y='200' font-family='monospace' font-size='9' fill='#2a4060'>    hash: varchar</text>
  <text x='570' y='216' font-family='monospace' font-size='9' fill='#2a4060'>    refresh_token</text>

  <!-- Products table -->
  <rect x='750' y='100' width='150' height='120' rx='4' fill='#0f2240' stroke='#4ade80' stroke-width='1.5'/>
  <rect x='750' y='100' width='150' height='22' rx='4' fill='#0d3820'/>
  <text x='825' y='115' font-family='monospace' font-size='10' fill='#4ade80' text-anchor='middle' font-weight='bold'>products</text>
  <text x='758' y='136' font-family='monospace' font-size='9' fill='#65d6c9'>PK  id: uuid</text>
  <text x='758' y='152' font-family='monospace' font-size='9' fill='#2a4060'>    name: varchar</text>
  <text x='758' y='168' font-family='monospace' font-size='9' fill='#2a4060'>    spec: jsonb</text>
  <text x='758' y='184' font-family='monospace' font-size='9' fill='#2a4060'>    category_id</text>
  <text x='758' y='200' font-family='monospace' font-size='9' fill='#2a4060'>FK  owner_id</text>
  <text x='758' y='216' font-family='monospace' font-size='9' fill='#2a4060'>    updated_at</text>

  <!-- Relationship line -->
  <line x1='712' y1='160' x2='750' y2='160' stroke='#2a4060' stroke-width='1' stroke-dasharray='4,3'/>
  <text x='731' y='155' font-family='monospace' font-size='8' fill='#2a4060' text-anchor='middle'>1:N</text>

  <!-- Orders table -->
  <rect x='650' y='248' width='150' height='100' rx='4' fill='#0f2240' stroke='#f6c85f' stroke-width='1.5'/>
  <rect x='650' y='248' width='150' height='22' rx='4' fill='#2a1a00'/>
  <text x='725' y='263' font-family='monospace' font-size='10' fill='#f6c85f' text-anchor='middle' font-weight='bold'>orders</text>
  <text x='658' y='284' font-family='monospace' font-size='9' fill='#65d6c9'>PK  id: uuid</text>
  <text x='658' y='300' font-family='monospace' font-size='9' fill='#2a4060'>FK  user_id</text>
  <text x='658' y='316' font-family='monospace' font-size='9' fill='#2a4060'>FK  product_id</text>
  <text x='658' y='332' font-family='monospace' font-size='9' fill='#2a4060'>    status: enum</text>

  <!-- Relationship lines to orders -->
  <line x1='637' y1='220' x2='637' y2='248' stroke='#2a4060' stroke-width='1' stroke-dasharray='4,3'/>
  <text x='645' y='240' font-family='monospace' font-size='8' fill='#2a4060'>1:N</text>
  <line x1='825' y1='220' x2='825' y2='260' stroke='#2a4060' stroke-width='1' stroke-dasharray='4,3'/>
  <line x1='825' y1='260' x2='800' y2='285' stroke='#2a4060' stroke-width='1' stroke-dasharray='4,3'/>
  <text x='820' y='250' font-family='monospace' font-size='8' fill='#2a4060'>1:N</text>

  <!-- Test coverage panel -->
  <rect x='556' y='372' width='380' height='100' rx='4' fill='#0f2240' stroke='#152540' stroke-width='1'/>
  <text x='746' y='392' font-family='monospace' font-size='10' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>API TESTING — POSTMAN / JEST</text>
  <text x='564' y='412' font-family='monospace' font-size='9' fill='#2a4060'>Unit tests:</text>
  <rect x='644' y='402' width='100' height='12' rx='2' fill='#4ade80' opacity='0.7'/>
  <text x='750' y='414' font-family='monospace' font-size='9' fill='#4ade80'>87% coverage</text>
  <text x='564' y='432' font-family='monospace' font-size='9' fill='#2a4060'>Integration:</text>
  <rect x='644' y='422' width='74' height='12' rx='2' fill='#f6c85f' opacity='0.7'/>
  <text x='750' y='434' font-family='monospace' font-size='9' fill='#f6c85f'>74% coverage</text>
  <text x='564' y='452' font-family='monospace' font-size='9' fill='#2a4060'>E2E: Postman collections · 42 endpoint scenarios · CI-automated</text>

  <!-- Bottom tag strip -->
  <rect x='24' y='490' width='912' height='34' rx='5' fill='#0d1a2e'/>
  <text x='44' y='512' font-family='monospace' font-size='11' fill='#2a4060'>NestJS · TypeORM · PostgreSQL · REST · JWT · Guards · TypeScript · Postman · Jest</text>
</svg>
