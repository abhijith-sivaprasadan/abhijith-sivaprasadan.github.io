<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 480 270' role='img' aria-label='Numerical Heat Transfer MJ2515 Grade A finite difference methods'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
  </defs>
  <rect width='480' height='270' fill='url(#bg)'/>

  <!-- Grid lines (subtle) -->
  <g stroke='#1a2840' stroke-width='1'>
    <line x1='60' y1='40' x2='60' y2='200'/>
    <line x1='120' y1='40' x2='120' y2='200'/>
    <line x1='180' y1='40' x2='180' y2='200'/>
    <line x1='240' y1='40' x2='240' y2='200'/>
    <line x1='300' y1='40' x2='300' y2='200'/>
    <line x1='360' y1='40' x2='360' y2='200'/>
    <line x1='420' y1='40' x2='420' y2='200'/>
    <line x1='30' y1='70' x2='450' y2='70'/>
    <line x1='30' y1='110' x2='450' y2='110'/>
    <line x1='30' y1='150' x2='450' y2='150'/>
    <line x1='30' y1='190' x2='450' y2='190'/>
  </g>

  <!-- Axes -->
  <line x1='40' y1='30' x2='40' y2='210' stroke='#2a4060' stroke-width='1.5'/>
  <line x1='40' y1='210' x2='450' y2='210' stroke='#2a4060' stroke-width='1.5'/>

  <!-- Exact solution curve (cyan) -->
  <path d='M50 180 C100 140 160 90 220 72 C280 54 340 56 430 50' fill='none' stroke='#38bdf8' stroke-width='2.5'/>
  <!-- Numerical approximation (dashed amber) -->
  <path d='M50 180 L110 138 L170 92 L230 75 L290 59 L350 55 L430 52' fill='none' stroke='#f6c85f' stroke-width='1.8' stroke-dasharray='5,3'/>
  <!-- RK4 dots -->
  <circle cx='50' cy='180' r='4' fill='#f6c85f'/>
  <circle cx='110' cy='138' r='4' fill='#f6c85f'/>
  <circle cx='170' cy='92' r='4' fill='#f6c85f'/>
  <circle cx='230' cy='75' r='4' fill='#f6c85f'/>
  <circle cx='290' cy='59' r='4' fill='#f6c85f'/>
  <circle cx='350' cy='55' r='4' fill='#f6c85f'/>
  <circle cx='430' cy='52' r='4' fill='#f6c85f'/>

  <!-- Grade A badge -->
  <rect x='380' y='220' width='72' height='28' rx='4' fill='#1a3a1a'/>
  <text x='416' y='238' font-family='monospace' font-size='13' fill='#4ade80' text-anchor='middle' font-weight='bold'>Grade A</text>

  <!-- Labels -->
  <text x='48' y='24' font-family='monospace' font-size='11' fill='#2a4060'>Exact</text>
  <rect x='82' y='14' width='8' height='8' rx='1' fill='none' stroke='#38bdf8' stroke-width='1.5'/>
  <text x='96' y='24' font-family='monospace' font-size='11' fill='#2a4060'>Numerical (RK4)</text>
  <rect x='220' y='14' width='8' height='8' rx='1' fill='none' stroke='#f6c85f' stroke-width='1.5'/>

  <!-- Title block -->
  <text x='24' y='248' font-family='monospace' font-size='12' fill='#38bdf8' font-weight='bold'>MJ2515 · Numerical Heat Transfer</text>
  <text x='24' y='264' font-family='monospace' font-size='10' fill='#2a4060'>FD/FV schemes · stability · error analysis · advection</text>
</svg>
