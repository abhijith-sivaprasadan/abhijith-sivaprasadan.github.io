<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 540' role='img' aria-label='Rotating machinery vibration frequency analysis and FFT spectrum'>
  <defs>
    <linearGradient id='bg' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0' stop-color='#0b1220'/><stop offset='1' stop-color='#070c16'/>
    </linearGradient>
    <linearGradient id='specfill' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0%' stop-color='#38bdf8' stop-opacity='0.3'/>
      <stop offset='100%' stop-color='#38bdf8' stop-opacity='0.02'/>
    </linearGradient>
  </defs>
  <rect width='960' height='540' fill='url(#bg)'/>

  <!-- Title bar -->
  <rect x='24' y='14' width='912' height='36' rx='5' fill='#0d1a2e'/>
  <text x='44' y='38' font-family='monospace' font-size='14' fill='#65d6c9' font-weight='bold'>ROTATING MACHINERY · VIBRATION ANALYSIS · FFT SPECTRUM DIAGNOSTICS</text>

  <!-- Left panel: Rotor schematic -->
  <rect x='30' y='64' width='340' height='400' rx='4' fill='#0d1a2e'/>
  <text x='200' y='86' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>ROTATING SHAFT — IMBALANCE</text>

  <!-- Shaft -->
  <line x1='60' y1='260' x2='340' y2='260' stroke='#38bdf8' stroke-width='4'/>
  <!-- Shaft ends (bearings) -->
  <rect x='54' y='240' width='20' height='40' rx='3' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <rect x='316' y='240' width='20' height='40' rx='3' fill='#0d1a2e' stroke='#65d6c9' stroke-width='2'/>
  <text x='64' y='310' font-family='monospace' font-size='9' fill='#65d6c9' text-anchor='middle'>Brg A</text>
  <text x='326' y='310' font-family='monospace' font-size='9' fill='#65d6c9' text-anchor='middle'>Brg B</text>

  <!-- Disc 1 (balanced) -->
  <circle cx='140' cy='260' r='50' fill='#0d1a2e' stroke='#38bdf8' stroke-width='2'/>
  <circle cx='140' cy='260' r='8' fill='#0d1a2e' stroke='#38bdf8' stroke-width='1.5'/>
  <!-- Balanced disc label -->
  <text x='140' y='325' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>Disc 1 — balanced</text>

  <!-- Disc 2 (imbalanced — mass offset) -->
  <circle cx='256' cy='260' r='50' fill='#0d1a2e' stroke='#d0622c' stroke-width='2'/>
  <circle cx='256' cy='260' r='8' fill='#0d1a2e' stroke='#d0622c' stroke-width='1.5'/>
  <!-- Imbalance mass -->
  <circle cx='272' cy='222' r='10' fill='#d0622c' opacity='0.8'/>
  <text x='290' y='216' font-family='monospace' font-size='9' fill='#d0622c'>Δm</text>
  <!-- Centrifugal force arrow -->
  <line x1='272' y1='212' x2='284' y2='192' stroke='#d0622c' stroke-width='1.5'/>
  <text x='286' y='188' font-family='monospace' font-size='8' fill='#d0622c'>F_c</text>
  <text x='256' y='325' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>Disc 2 — imbalance</text>

  <!-- Accelerometer sensors -->
  <rect x='100' y='200' width='18' height='12' rx='1' fill='#f6c85f' stroke='#f6c85f' stroke-width='1'/>
  <text x='109' y='192' font-family='monospace' font-size='8' fill='#f6c85f' text-anchor='middle'>ACC1</text>
  <rect x='228' y='200' width='18' height='12' rx='1' fill='#f6c85f' stroke='#f6c85f' stroke-width='1'/>
  <text x='237' y='192' font-family='monospace' font-size='8' fill='#f6c85f' text-anchor='middle'>ACC2</text>

  <!-- Rotation speed annotation -->
  <!-- Rotation arrow -->
  <path d='M166,232 A30,30 0 0,1 198,232' fill='none' stroke='#38bdf8' stroke-width='1.5'/>
  <line x1='198' y1='232' x2='200' y2='222' stroke='#38bdf8' stroke-width='1.5'/>
  <text x='200' y='175' font-family='monospace' font-size='10' fill='#38bdf8' text-anchor='middle'>N = 1500 rpm</text>
  <text x='200' y='190' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>f₀ = 25 Hz</text>

  <!-- Bearing fault frequency labels -->
  <rect x='36' y='355' width='288' height='90' rx='4' fill='#0d1a2e' stroke='#152540' stroke-width='1'/>
  <text x='180' y='374' font-family='monospace' font-size='10' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>FAULT FREQUENCIES</text>
  <text x='50' y='392' font-family='monospace' font-size='9' fill='#38bdf8'>1× = 25 Hz  (unbalance)</text>
  <text x='50' y='408' font-family='monospace' font-size='9' fill='#d0622c'>2× = 50 Hz  (misalign.)</text>
  <text x='50' y='424' font-family='monospace' font-size='9' fill='#f6c85f'>BPFO = 94 Hz (outer race)</text>
  <text x='50' y='440' font-family='monospace' font-size='9' fill='#8f7fff'>BPFI = 156 Hz (inner race)</text>

  <!-- Right panel: FFT spectrum -->
  <rect x='390' y='64' width='550' height='400' rx='4' fill='#0d1a2e'/>
  <text x='665' y='86' font-family='monospace' font-size='11' fill='#c8d8ea' text-anchor='middle' font-weight='bold'>VIBRATION SPECTRUM — FFT [ACC2, vertical]</text>

  <!-- Chart axes -->
  <line x1='430' y1='100' x2='430' y2='420' stroke='#2a4060' stroke-width='1.2'/>
  <line x1='430' y1='420' x2='920' y2='420' stroke='#2a4060' stroke-width='1.2'/>

  <!-- Y-axis labels [g_rms] -->
  <text x='424' y='424' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>0</text>
  <text x='424' y='364' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>0.2</text>
  <text x='424' y='304' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>0.4</text>
  <text x='424' y='244' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>0.6</text>
  <text x='424' y='184' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>0.8</text>
  <text x='424' y='124' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='end'>1.0</text>
  <text x='415' y='270' font-family='monospace' font-size='9' fill='#2a4060' transform='rotate(-90,415,270)' text-anchor='middle'>g_rms</text>

  <!-- X-axis labels [Hz] -->
  <text x='430' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>0</text>
  <text x='547' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>50</text>
  <text x='664' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>100</text>
  <text x='781' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>150</text>
  <text x='898' y='436' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>200 Hz</text>

  <!-- Grid lines -->
  <line x1='547' y1='100' x2='547' y2='420' stroke='#152540' stroke-width='0.7' stroke-dasharray='3,4'/>
  <line x1='664' y1='100' x2='664' y2='420' stroke='#152540' stroke-width='0.7' stroke-dasharray='3,4'/>
  <line x1='781' y1='100' x2='781' y2='420' stroke='#152540' stroke-width='0.7' stroke-dasharray='3,4'/>
  <line x1='430' y1='364' x2='920' y2='364' stroke='#152540' stroke-width='0.5'/>
  <line x1='430' y1='304' x2='920' y2='304' stroke='#152540' stroke-width='0.5'/>
  <line x1='430' y1='244' x2='920' y2='244' stroke='#152540' stroke-width='0.5'/>

  <!-- Noise floor (broad background) -->
  <polygon points='430,414 920,414 920,406 430,406' fill='#152540' opacity='0.5'/>

  <!-- Harmonic peaks: 1x (25Hz, dominant unbalance) -->
  <!-- x for 25Hz: 430 + (25/200)*490 = 430 + 61 = 491 -->
  <rect x='484' y='140' width='14' height='280' rx='1' fill='#38bdf8' opacity='0.9'/>
  <polygon points='484,140 491,110 498,140' fill='#38bdf8' opacity='0.9'/>
  <text x='491' y='104' font-family='monospace' font-size='9' fill='#38bdf8' text-anchor='middle'>1×</text>
  <text x='491' y='448' font-family='monospace' font-size='8' fill='#38bdf8' text-anchor='middle'>25Hz</text>

  <!-- 2x (50Hz, misalignment) -->
  <!-- x: 430 + (50/200)*490 = 430+122 = 552 -->
  <rect x='545' y='290' width='14' height='130' rx='1' fill='#d0622c' opacity='0.9'/>
  <text x='552' y='284' font-family='monospace' font-size='9' fill='#d0622c' text-anchor='middle'>2×</text>
  <text x='552' y='448' font-family='monospace' font-size='8' fill='#d0622c' text-anchor='middle'>50Hz</text>

  <!-- 3x (75Hz, minor) -->
  <!-- x: 430 + (75/200)*490 = 430+183 = 613 -->
  <rect x='606' y='376' width='12' height='44' rx='1' fill='#38bdf8' opacity='0.6'/>
  <text x='612' y='448' font-family='monospace' font-size='8' fill='#38bdf8' text-anchor='middle'>3×</text>

  <!-- BPFO outer race fault (94Hz) -->
  <!-- x: 430 + (94/200)*490 = 430+230 = 660 -->
  <rect x='655' y='320' width='12' height='100' rx='1' fill='#f6c85f' opacity='0.9'/>
  <text x='661' y='313' font-family='monospace' font-size='9' fill='#f6c85f' text-anchor='middle'>BPFO</text>
  <text x='661' y='448' font-family='monospace' font-size='8' fill='#f6c85f' text-anchor='middle'>94Hz</text>

  <!-- BPFI inner race (156Hz) -->
  <!-- x: 430 + (156/200)*490 = 430+382 = 812 -->
  <rect x='806' y='342' width='12' height='78' rx='1' fill='#8f7fff' opacity='0.9'/>
  <text x='812' y='335' font-family='monospace' font-size='9' fill='#8f7fff' text-anchor='middle'>BPFI</text>
  <text x='812' y='448' font-family='monospace' font-size='8' fill='#8f7fff' text-anchor='middle'>156Hz</text>

  <!-- Overall vibration metric -->
  <rect x='750' y='104' width='160' height='54' rx='4' fill='#0d1a2e' stroke='#d0622c' stroke-width='1.5'/>
  <text x='830' y='122' font-family='monospace' font-size='10' fill='#d0622c' text-anchor='middle'>Overall: 0.92 g_rms</text>
  <text x='830' y='138' font-family='monospace' font-size='9' fill='#f6c85f' text-anchor='middle'>ISO 10816: ZONE C</text>
  <text x='830' y='152' font-family='monospace' font-size='9' fill='#2a4060' text-anchor='middle'>Alert — monitor</text>

  <!-- Bottom tag strip -->
  <rect x='24' y='490' width='912' height='34' rx='5' fill='#0d1a2e'/>
  <text x='44' y='512' font-family='monospace' font-size='11' fill='#2a4060'>FFT · Vibration · Rotating machinery · Bearing fault · ISO 10816 · Accelerometer · NI-DAQ</text>
</svg>
