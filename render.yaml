services:
  - type: web
    name: abhijith-portfolio-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HOST
        value: 0.0.0.0
      - key: FRONTEND_ORIGIN
        value: https://abhijith-sivaprasadan.github.io
      - key: ADMIN_API_TOKEN
        generateValue: true
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: ADMIN_EMAIL_HASHES
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
